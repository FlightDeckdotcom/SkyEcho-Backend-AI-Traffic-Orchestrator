 14px;display:flex;align-items:center;gap:8px}.notice.success{background:#10b98124;color:#d1fae5}.notice.warning{background:#f59e0b24;color:#fde68a}.audit-tile{background:#0f172a;border-radius:16px;padding:14px}.audit-tile span{display:block;color:#cbd5e1;margin-bottom:4px;text-transform:capitalize}.audit-tile strong{color:#fff}.logs-panel{margin-top:18px}.logs-wrap{display:flex;flex-direction:column;gap:12px;max-height:430px;overflow:auto}.log{border-radius:18px;padding:14px}.log-meta{display:flex;justify-content:space-between;color:#cbd5e1;text-transform:uppercase;letter-spacing:.08em;font-size:.72rem;margin-bottom:6px}.log-atc{background:#0ea5e91f}.log-pilot{background:#10b9811f}.log-crew{background:#a855f71f}.log-network{background:#22d3ee1f}.log-system{background:#1e293beb}@media (max-width: 1100px){.top-grid{grid-template-columns:repeat(2,1fr)}.main-grid{grid-template-columns:1fr}}@media (max-width: 760px){.app-shell{padding:14px}.hero{flex-direction:column;align-items:flex-start}.two-col,.mic-grid,.form-grid,.audit-grid,.top-grid{grid-template-columns:1fr}.ptt-head{font-size:1.2rem}}.eleven-grid,.inline-note{margin-bottom:14px}.inline-submit{display:flex;gap:10px;align-items:stretch}.inline-submit textarea{flex:1}.inline-field{display:flex;gap:10px;align-items:center}.inline-field input{flex:1}.enter-btn,.small-btn{white-space:nowrap;display:inline-flex;align-items:center;gap:6px}.small-btn{padding-inline:16px}@media (max-width: 900px){.inline-submit,.inline-field{flex-direction:column}}


/* SkyEcho patch: vibrant purple/blue cockpit background */
body{background:
  radial-gradient(circle at 18% 8%,rgba(147,51,234,.55),transparent 30%),
  radial-gradient(circle at 82% 14%,rgba(14,165,233,.42),transparent 28%),
  radial-gradient(circle at 50% 92%,rgba(59,130,246,.34),transparent 36%),
  linear-gradient(135deg,#16002e 0%,#24105f 34%,#07235f 68%,#020617 100%) !important;}

<script>
(function(){

  function qs(id){return document.getElementById(id)}

  function save(){const a=qs('be57_airport'),d=qs('be57_density'),ready=qs('be57_ready'); if(a) state.airport=a.value.trim().toUpperCase()||'TAPA'; if(d) state.density=d.value; if(ready) state.autoReady=ready.checked; localStorage.setItem(LS+'airport',state.airport);localStorage.setItem(LS+'density',state.density);localStorage.setItem(LS+'ready',state.autoReady?'1':'0');addLog('SYSTEM','Settings saved. Backend credentials are locked for users.');}
  function setDesiredTraffic(on){state.desiredTraffic=!!on; if(on) window.__skyechoAiTrafficArmed=true; localStorage.setItem(LS+'desiredTraffic',state.desiredTraffic?'1':'0');}

  function getSkyEchoContext(){
    let txt='';
    try{ txt = ((document.querySelector('.phase-badge')||{}).textContent||'') + ' ' + (document.body&&document.body.innerText||'').slice(0,3000); }catch(_){ txt=''; }
    const lower=String(txt||'').toLowerCase();
    let phase='preflight', controllerRole='clearance', frequency='clearance';
    const mFreq=String(txt||'').match(/(\d{3}\.\d{1,3})/); if(mFreq) frequency=mFreq[1];
    if(/clearance|delivery|ifr clearance/.test(lower)){ phase='preflight'; controllerRole='clearance'; }
    else if(/pushback|startup|engine start|apron/.test(lower)){ phase='push_start'; controllerRole='ground'; }
    else if(/ground|taxi/.test(lower) && !/cleared runway|clear of runway|after landing|taxi to the gate|taxi to gates|taxi to ramp|taxi to fbo/.test(lower)){ phase='taxi_out'; controllerRole='ground'; }
    else if(/holding short|ready for departure|cleared for takeoff|tower/.test(lower)){ phase='tower_departure'; controllerRole='tower'; }
    else if(/departure|radar contact|climb/.test(lower)){ phase='departure_climb'; controllerRole='departure'; }
    else if(/center|enroute|cruise|on course/.test(lower)){ phase='enroute'; controllerRole='center'; }
    else if(/approach|arrival|descent|visual approach|ils/.test(lower)){ phase='arrival_approach'; controllerRole='approach'; }
    else if(/final|cleared to land|landing/.test(lower)){ phase='final_landing'; controllerRole='tower'; }
    if(/clear of runway|cleared runway|after landing|taxi to the gate|taxi to gates|taxi to ramp|taxi to stand|taxi to fbo/.test(lower)){ phase='taxi_in'; controllerRole='ground'; }

  function connect(silent){save(); try{ if(state.ws) state.ws.close(); }catch(_){} state.ws=new WebSocket(wsUrl()); state.ws.onopen=()=>{state.connected=true;updateStatus();addLog('WS','Backend websocket connected.'); if(state.autoReady) setTimeout(()=>prepareBackend().catch(e=>addLog('ERROR','Backend prepare failed: '+e.message)),600);}; state.ws.onclose=()=>{state.connected=false;updateStatus(); if(!silent) addLog('WS','Backend websocket closed.');}; state.ws.onerror=()=>addLog('ERROR','Backend websocket error.'); state.ws.onmessage=e=>{ if(window.__skyechoTrafficV2Stopped) return;try{handleMessage(JSON.parse(e.data));}catch(_){}}; }

  function digitsToWords(s){return String(s||'').replace(/\b(\d)\b/g,function(_,d){return ['zero','one','two','three','four','five','six','seven','eight','niner'][Number(d)]||d;});}
  function normalizeRunway(r){r=String(r||'07').toUpperCase().replace(/^0?(\d)$/,'0$1');return r;}
  function aiAtcInstructionFor(req){
    // v6.9.25 UltraStrict: aircraft-state ATC response builder.
    // This keeps SkyEchoCabin as the controller, but makes every AI aircraft progress
    // through a real clearance -> push -> taxi -> takeoff -> climb -> enroute -> descent -> approach -> landing -> taxi-in chain.
    req=req||{};
    const cs=req.spokenCallsign||req.callsign||'Traffic';
    const rwy=normalizeRunway(req.runway||req.assignedRunway||'07');
    const route=String(req.route||'DCT').trim()||'DCT';
    const alt=aiInitialClimbAltitude(req);
    const approachAlt=aiApproachTargetAltitude(req);
    const sq=aiSquawkCode(req.squawk||'1200');
    const intent=aiCanonicalIntent(req.intent||req.phase||req.pendingRequestId||'');
    const dest=req.dest||req.destination||'destination';
    const origin=req.origin||state.airport||'';
    const destName=String(dest).toUpperCase();
    const exitVia=req.exitTaxiway||'Alpha';
    let instruction='', readback='', nextPhase='';
    if(req.suggestedInstruction && req.suggestedReadback){
      instruction=req.suggestedInstruction; readback=req.suggestedReadback; nextPhase=req.nextPhase||aiNextPhase(intent);
    }else if(intent==='ifr_clearance'){
      instruction=`${cs}, cleared to ${destName} via ${route}, depart runway ${rwy}, climb initially ${alt}, squawk ${sq}.`;
      readback=`Cleared to ${destName} via ${route}, depart runway ${rwy}, climb initially ${alt}, squawk ${sq}, ${cs}.`;
      nextPhase='PUSHBACK';
    }else if(intent==='pushback'){
      instruction=`${cs}, pushback and startup approved, face east, report ready to taxi.`;
      readback=`Pushback and startup approved, face east, will report ready to taxi, ${cs}.`;
      nextPhase='TAXI';
    }else if(intent==='taxi'){
      instruction=`${cs}, taxi to runway ${rwy} via Alpha, hold short runway ${rwy}.`;
      readback=`Taxi to runway ${rwy} via Alpha, hold short runway ${rwy}, ${cs}.`;
      nextPhase='HOLD_SHORT';
    }else if(intent==='takeoff'){
      instruction=`${cs}, runway ${rwy}, wind calm, cleared for takeoff.`;
      readback=`Cleared for takeoff runway ${rwy}, ${cs}.`;
      nextPhase='CLIMB';
    }else if(intent==='climb'){
      instruction=`${cs}, radar contact, climb and maintain ${alt}, proceed on course.`;
      readback=`Climb and maintain ${alt}, proceed on course, ${cs}.`;
      nextPhase='ENROUTE';
    }else if(intent==='enroute'){
      instruction=`${cs}, roger, continue present course, report top of descent.`;
      readback=`Continue present course, will report top of descent, ${cs}.`;
      nextPhase='DESCENT';
    }else if(intent==='descent'){
      instruction=`${cs}, descend and maintain ${approachAlt}, expect runway ${rwy} approach.`;
      readback=`Descend and maintain ${approachAlt}, expect runway ${rwy} approach, ${cs}.`;
      nextPhase='APPROACH';
    }else if(intent==='approach'){
      instruction=`${cs}, cleared visual runway ${rwy} approach, report final.`;
      readback=`Cleared visual runway ${rwy} approach, will report final, ${cs}.`;
      nextPhase='FINAL';
    }else if(intent==='landing'){
      instruction=`${cs}, runway ${rwy}, wind calm, cleared to land.`;
      readback=`Cleared to land runway ${rwy}, ${cs}.`;
      nextPhase='TAXI_IN';
    }else if(intent==='taxi_in'){
      instruction=`${cs}, taxi to parking via ${exitVia}. Hold short of all active runways.`;
      readback=`Taxi to parking via ${exitVia}, hold short of all active runways, ${cs}.`;
      nextPhase='DONE';
    }else{
      instruction=`${cs}, roger, continue as instructed.`;
      readback=`Continuing as instructed, ${cs}.`;
      nextPhase=aiNextPhase(intent)||req.nextPhase||req.phase||'ENROUTE';
    }
    instruction=aiDisplayPhraseology(digitsToWords(instruction)); readback=aiDisplayPhraseology(digitsToWords(readback));
    return {instruction,readback,nextPhase,intent};

  // v6.9.25  // v6.9.24: ATC-refresher-style local AI traffic gate.
  // The backend may resend/loop old phase requests. This frontend now only allows
  // AI traffic whose current intent belongs on the same controller type the user is monitoring,
  // and it never lets an aircraft step backwards from airborne to ground/taxi phases.
  function aiCanonicalIntent(x){
    x=String(x||'').toLowerCase().replace(/[\s-]+/g,'_');
    if(/ifr|clearance|pre_flight|prefight|delivery|request_clearance/.test(x))return 'ifr_clearance';
    if(/push|startup|start/.test(x))return 'pushback';
    if(/taxi_in|after_landing|clear_of_runway|gate|ramp|parking|stand|fbo/.test(x))return 'taxi_in';
    if(/hold_short|ready_departure|ready_for_departure/.test(x))return 'takeoff';
    if(/taxi_out|ready_taxi|taxi/.test(x))return 'taxi';
    if(/takeoff|departure_roll/.test(x))return 'takeoff';
    if(/climb|initial_climb|departure/.test(x))return 'climb';
    if(/enroute|cruise|on_course|proceeding|report_fix|waypoint|airway/.test(x))return 'enroute';
    if(/descent|arrival|top_of_descent/.test(x))return 'descent';
    if(/approach|visual|ils|rnav/.test(x))return 'approach';
    if(/final|landing|land/.test(x))return 'landing';
    if(/done|parked|complete/.test(x))return 'done';
    return x||'ifr_clearance';
  }
  function aiIntentOrder(x){
    const order={ifr_clearance:0,pushback:1,taxi:2,takeoff:3,climb:4,enroute:5,descent:6,approach:7,landing:8,taxi_in:9,done:10};
    x=aiCanonicalIntent(x);
    return Object.prototype.hasOwnProperty.call(order,x)?order[x]:0;
  }
  function aiNextPhase(intent){
    intent=aiCanonicalIntent(intent);
    const next={ifr_clearance:'PUSHBACK',pushback:'TAXI',taxi:'HOLD_SHORT',takeoff:'CLIMB',climb:'ENROUTE',enroute:'DESCENT',descent:'APPROACH',approach:'FINAL',landing:'TAXI_IN',taxi_in:'DONE',done:'DONE'};
    return next[intent]||'';
  }
  function aiExpectedIntentAfter(intent){
    intent=aiCanonicalIntent(intent);
    const next={ifr_clearance:'pushback',pushback:'taxi',taxi:'takeoff',takeoff:'climb',climb:'enroute',enroute:'descent',descent:'approach',approach:'landing',landing:'taxi_in',taxi_in:'done',done:'done'};
    return next[intent]||intent;
  }
  function aiTrafficKey(req,a){
    return String((req&&req.callsign)||(req&&req.spokenCallsign)||(a&&a.callsign)||(a&&a.icao24)||'traffic').toUpperCase().replace(/[^A-Z0-9]/g,'');
  }
  function aiEnsureAircraftState(req,a){
    state.aiProcedure=state.aiProcedure||{};
    const key=aiTrafficKey(req,a);
    if(!state.aiProcedure[key]){
      const raw=aiCanonicalIntent((req&&req.intent)||(a&&a.phase)||(a&&a.pendingRequestId)||'ifr_clearance');
      state.aiProcedure[key]={key,phase:raw,expected:raw,lastIntent:'',lastAt:0,cycles:0,origin:(req&&req.origin)||(a&&a.origin)||'',dest:(req&&req.dest)||(a&&a.dest)||(a&&a.destination)||'',readbackRequired:false};
    }
    return state.aiProcedure[key];
  }
  function aiUserRoleAllowsIntent(intent){
    const ctx=getSkyEchoContext();
    const role=String(ctx.controllerRole||'').toLowerCase();
    const phase=String(ctx.phase||'').toLowerCase();
    intent=aiCanonicalIntent(intent);
    const map={
      clearance:['ifr_clearance'],
      ground:['ifr_clearance','pushback','taxi','taxi_in'],
      tower:['takeoff','landing'],
      departure:['climb'],
      center:['enroute','descent'],
      enroute:['enroute','descent'],
      approach:['descent','approach','landing']
    };
    let allowed=map[role]||[];
    if(phase==='taxi_in') allowed=['taxi_in'];
    if(phase==='preflight') allowed=['ifr_clearance'];
    if(phase==='push_start') allowed=['pushback','taxi'];
    return !allowed.length || allowed.includes(intent);
  }
  function aiTrafficProgressionAllowed(req,a){
    const key=aiTrafficKey(req,a);
    const intent=aiCanonicalIntent((req&&req.intent)||(a&&a.phase)||(a&&a.pendingRequestId));
    const proc=aiEnsureAircraftState(req,a);
    const lastOrder=aiIntentOrder(proc.lastIntent||proc.phase||proc.expected);
    const thisOrder=aiIntentOrder(intent);
    if(proc.lastIntent && thisOrder<lastOrder){
      addLog('AI STATE',`Suppressed backward AI phase for ${req.spokenCallsign||req.callsign||key}: ${intent} after ${proc.lastIntent}.`);
      return false;
    }
    if(proc.expected && intent!==proc.expected && thisOrder<aiIntentOrder(proc.expected)){
      addLog('AI STATE',`Suppressed stale AI request for ${req.spokenCallsign||req.callsign||key}: ${intent}; expected ${proc.expected}.`);
      return false;
    }
    if(!aiUserRoleAllowsIntent(intent)){
      addLog('AI SCOPE',`Suppressed off-frequency AI ${intent} for ${req.spokenCallsign||req.callsign||key}; user is on ${getSkyEchoContext().controllerRole}.`);
      return false;
    }
    const now=Date.now();
    if(proc.lastIntent===intent && now-proc.lastAt<75000){
      addLog('AI STATE',`Suppressed repeated live AI ${intent} for ${req.spokenCallsign||req.callsign||key}.`);
      return false;
    }
    return true;
  }
  function aiTrafficProgressionCommit(req,out){
    try{
      const proc=aiEnsureAircraftState(req,{});
      const intent=aiCanonicalIntent((out&&out.intent)||(req&&req.intent)||(req&&req.phase));
      const expected=aiExpectedIntentAfter(intent);
      proc.lastIntent=intent;
      proc.phase=expected;
      proc.expected=expected;
      proc.lastAt=Date.now();
      proc.readbackRequired=false;
      proc.cycles=(proc.cycles||0)+1;
      state.aiLocalProgress=state.aiLocalProgress||{};
      state.aiLocalProgress[proc.key]={intent,expected,at:proc.lastAt};
      addLog('AI STATE',`${req.spokenCallsign||req.callsign||proc.key} advanced ${intent} → ${expected}.`);
    }catch(e){ try{addLog('AI STATE ERROR',(e&&e.message)||String(e));}catch(_){} }
  }
  async function speakAiAtcWithSharedVoice(text,label){
    // v6.9.22: RESTORE the real SkyEchoCabin ATC voice engine for AI traffic.
    // The previous direct browser-only ATC path could bypass the app's active controller voice
    // and could fail silently. This calls the same Ii/__skyechoAiSpeakAtc path used when
    // SkyEcho answers the user, so AI traffic hears the same controller voice on frequency.
    text=String(text||'').trim();
    if(!text) return false;
    let ok=false;
    try{
      window.__skyechoAiAtcSpeaking=true;
      aiHoldRadio(Math.max(18000,Math.min(42000,text.length*95+9000)),'SkyEchoCabin ATC replying to AI traffic');
      if(typeof window.__skyechoAiSpeakAtc==='function'){
        await window.__skyechoAiSpeakAtc(text);
        ok=true;
      }else if(typeof Ii==='function'){
        await Ii(text,'atc');
        ok=true;
      }
      if(ok){ addLog('AI ATC VOICE','SkyEchoCabin ATC engine replied to '+label); return true; }
    }catch(e){
      addLog('AI ATC VOICE ERROR','SkyEchoCabin ATC engine failed for '+label+': '+((e&&e.message)||e));
    }finally{
      window.__skyechoAiAtcSpeaking=false;
      aiHoldRadio(1600,'AI ATC reply tail');
    }

    // v6.9.30 UltraStrict: browser ATC fallback is disabled during AI traffic.
    // If the real controller/Piper path is unavailable, stay silent and log the failure instead of
    // creating the browser-voice sound that makes the frontend feel wrong.
    addLog('AI ATC VOICE ERROR','Browser ATC fallback blocked for '+label+'; waiting for real SkyEcho/Piper controller audio.');
    return false;
  }
  // SkyEcho v6.9.8c SAFE: single-frequency radio serializer built from the working v6.9.6 file.
  // It keeps the working shared-controller voice path, but prevents AI request / ATC / readback overlap.
  function aiSleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
  function aiRadioBusy(){
    const now=Date.now();
    return !!(state.audioPlaying || state.currentBackendAudio || state.pilotTx || (now-state.lastTxAt<2200) || window.__skyechoAiPilotSpeaking || window.__skyechoAiAtcSpeaking || (window.__skyechoAiRadioBusyUntil&&now<window.__skyechoAiRadioBusyUntil));
  }
  function aiHoldRadio(ms,why){
    const until=Date.now()+Number(ms||0);
    window.__skyechoAiRadioBusyUntil=Math.max(Number(window.__skyechoAiRadioBusyUntil||0),until);
    if(why) window.__skyechoAiRadioBusyReason=why;
  }
  function aiTrafficEnabledForFrontend(){
    // v6.9.12: arm AI traffic only after a user gesture/start in this page session,
    // but allow backend-panel Start Traffic buttons to arm it too. This restores audio
    // when the backend panel starts traffic without calling this module's startTraffic().
    try{
      const audioOk=!!(window.__skyechoAudioUnlocked||window.__skyechoBackendAudioUnlocked||localStorage.getItem(LS+'audioUnlocked')==='1');
      const armed=!!(window.__skyechoAiTrafficArmed || state.desiredTraffic);
      return !!(state && armed && audioOk && state.connected);
    }catch(_){ return false; }
  }
  function aiRequestSignature(req){
    req=req||{};
    const a=String(req.callsign||req.spokenCallsign||'').toUpperCase().replace(/\s+/g,'');
    const b=String(req.intent||req.action||'').toLowerCase();
    const c=String(req.dest||req.destination||req.text||'').toUpperCase().replace(/\s+/g,' ').slice(0,90);
    return a+'|'+b+'|'+c;
  }
  function aiRecentSignatureSeen(sig,ttlMs){
    // v6.9.10: never suppress a live backend pendingRequestId by callsign/destination signature.
    // Backend v2 creates a new requestId when it retries; suppressing by signature caused AI_BRIDGE_TIMEOUT.
    // RequestId-level de-dupe still protects against duplicate handling of the exact same request.
    return false;
  }

  async function aiWaitRadioClear(label,maxMs){
    const start=Date.now();
    maxMs=Number(maxMs||18000);
    while(aiRadioBusy() && Date.now()-start<maxMs){
      await aiSleep(350);
    }
    if(aiRadioBusy()) addLog('RADIO HOLD','Proceeding after wait window for '+(label||'AI radio'));
  }
  function chooseAiPilotVoice(){
    try{
      const all=window.speechSynthesis?window.speechSynthesis.getVoices():[];
      const en=(all||[]).filter(v=>/^en[-_]/i.test(v.lang||''));
      const pool=en.length?en:all;
      const prefer=pool.find(v=>/alex|daniel|david|fred|tom|guy|ryan|arthur|oliver|george|lee|male/i.test(v.name||'')) || pool[0];
      return prefer||null;
    }catch(_){ return null; }
  }
  function ensureSpeechVoicesReady(){
    return new Promise(resolve=>{
      try{
        if(!('speechSynthesis' in window)) return resolve([]);
        const s=window.speechSynthesis;
        try{s.resume&&s.resume();}catch(_){}
        let voices=s.getVoices&&s.getVoices()||[];

    const installed=(window.__skyechoPiperVoices||[]).filter(v=>/^en[_-]/i.test(v)&&/-(low|medium|high)$/i.test(v));
    const fallback=(typeof UxPiperMainLibraryVoices==='function'?UxPiperMainLibraryVoices():[

      'en_GB-southern_english_female-high','en_GB-southern_english_female-medium','en_GB-southern_english_female-low'
    ]);
    const pool=installed.length?installed:fallback;

  async function playAiTrafficPiperAudioUrl(audioUrl, clean, label){

      let a=null, done=false, started=false, timer=null;

      function finish(ok,err){
        if(done) return;

        try{ if(a){ a.pause(); a.removeAttribute('src'); a.load&&a.load(); a.remove&&a.remove(); } }catch(_){ }
        if(state.currentBackendAudio===a) state.currentBackendAudio=null;

      }

        a.onended=()=>finish(true);

        timer=setTimeout(()=>{

  function aiKokoroTrafficVoice(text,label){
    // v6.9.29: AI traffic pilot voice uses the backend Kokoro route first.
    // This does not touch SkyEchoCabin ATC controller voice. Piper medium/low remains the fallback.
    text=String(text||'').trim();
    label=String(label||'AI traffic').trim();
    if(!text) return Promise.resolve(false);
    const clean=(typeof Rm==='function') ? Rm(text) : text;
    const candidates=['/api/traffic/kokoro-tts','/traffic/kokoro-tts'];
    const voicePool=['af_heart','af_bella','am_adam','am_michael','bf_emma','bm_george'];
    const h=String(label+' '+clean).split('').reduce((a,b)=>a+b.charCodeAt(0),0);
    const selectedVoice=voicePool[h%voicePool.length];
    async function postKokoro(path){
      const origin=base();
      const res=await fetch(origin+path,{method:'POST',headers:headers(),body:JSON.stringify({text:clean,callsign:label,voice:selectedVoice,speed:1.0,role:'traffic',radio:true,format:'wav'})});
      if(!res.ok){
        let err=''; try{err=await res.text();}catch(_){ }
        throw new Error('Kokoro HTTP '+res.status+(err?': '+err.slice(0,150):''));
      }
      const ct=String(res.headers.get('content-type')||'').toLowerCase();
      if(ct.includes('json') || ct.includes('text/plain') || ct.includes('text/json')){
        const txt=await res.text();
        let j=null; try{j=JSON.parse(txt);}catch(_){ throw new Error('Kokoro returned non-JSON text: '+txt.slice(0,120)); }
        if(j && j.ok===false) throw new Error(j.error||'Kokoro returned ok:false');
        const raw=j && (j.audioUrl||j.audio_url||j.audioPath||j.audio_path||j.url||j.path||j.file);
        if(!raw) throw new Error('Kokoro JSON had no audioUrl');
        const audioUrl=/^https?:\/\//i.test(String(raw)) ? String(raw) : (String(raw).startsWith('/') ? origin+String(raw) : origin+'/'+String(raw).replace(/^\.\//,''));
        addLog('AI PILOT VOICE','Kokoro traffic WAV URL for '+label+': '+audioUrl.replace(origin,''));
        await playAiTrafficPiperAudioUrl(audioUrl,clean,label);
        addLog('AI PILOT VOICE','Kokoro traffic pilot voice completed for '+label);
        return true;
      }
      const blob=await res.blob();
      if(!blob || blob.size<4096) throw new Error('Kokoro audio blob too small');
      const obj=URL.createObjectURL(blob);
      try{
        addLog('AI PILOT VOICE','Kokoro blob received for '+label+' ('+blob.size+' bytes)');
        await playAiTrafficPiperAudioUrl(obj,clean,label);
        addLog('AI PILOT VOICE','Kokoro traffic pilot voice completed for '+label);
        return true;
      }finally{ try{URL.revokeObjectURL(obj);}catch(_){ } }
    }
    return (async()=>{
      let lastErr='';
      for(const path of candidates){
        try{return await postKokoro(path);}catch(e){lastErr=(e&&e.message)||String(e); addLog('AI PILOT VOICE ERROR','Kokoro failed on '+path+' for '+label+': '+lastErr);}
      }
      addLog('AI PILOT VOICE','Kokoro unavailable for '+label+'; falling back to Piper medium/low.');
      return false;
    })();
  }

  async function handleAiPilotRequest(req){
    req=req||{};
    const ctx=getSkyEchoContext();
    const label=req.spokenCallsign||req.callsign||'AI traffic';
    if(!aiTrafficEnabledForFrontend()){
      addLog('AI BRIDGE','AI request ignored until traffic is started and audio is enabled for '+label);
      return;
    }
    if(req.requestId){

      state.aiBridgeInFlight=state.aiBridgeInFlight||{};
      if(state.aiBridgeInFlight[req.requestId]){ addLog('AI BRIDGE','Duplicate request ignored for '+label); return; }
      state.aiBridgeSeen[req.requestId]=Date.now();
      state.aiBridgeInFlight[req.requestId]=Date.now();
    }
    async function replyToBackend(status, extra){
      const payload={
        secret:state.secret,
        requestId:req.requestId,
        callsign:req.callsign,
        status,
        instruction:'',
        readback:'',
        nextPhase:req.nextPhase||req.phase||'',
        reason:status,

        ...(extra||{})
      };

        }

    }
    function phaseAllowedInScope(scope, phase){
      scope=String(scope||'').toUpperCase().replace(/[\s-]+/g,'_');
      phase=String(phase||'').toUpperCase().replace(/[\s-]+/g,'_');
      if(!scope || !phase) return true;
      if(scope.includes(phase) || phase.includes(scope)) return true;
      const groups={
        CLEARANCE:['PRE_FLIGHT','PREFLIGHT','CLEARANCE','IFR_CLEARANCE','VFR_CLEARANCE','DELIVERY','REQUEST_CLEARANCE','STARTUP','PUSHBACK'],
        // Clearance delivery is often handled while the aircraft radio object still says Ground.
        // Treat PRE_FLIGHT/IFR_CLEARANCE as valid on Ground so the poll fallback does not reject it.
        GROUND:['PRE_FLIGHT','PREFLIGHT','CLEARANCE','IFR_CLEARANCE','REQUEST_CLEARANCE','GROUND','PUSHBACK','STARTUP','TAXI','TAXI_OUT','HOLD_SHORT','RAMP','GATE'],
        TOWER:['TOWER','HOLD_SHORT','TAKEOFF','DEPARTURE_ROLL','FINAL','LANDING','ROLL_OUT','ROLLOUT'],
        DEPARTURE:['DEPARTURE','CLIMB','CLIMBING','TAKEOFF','INITIAL_CLIMB'],
        ENROUTE:['ENROUTE','CRUISE','CLIMB','DESCENT','ON_COURSE','PROCEEDING'],
        APPROACH:['APPROACH','DESCENT','ARRIVAL','FINAL','LANDING','VISUAL_APPROACH','ILS','RNAV'],
        TAXI_IN:['TAXI_IN','AFTER_LANDING','CLEAR_OF_RUNWAY','RAMP','GATE','STAND','FBO','PARKING']
      };
      const scopeKeys=Object.keys(groups).filter(k=>scope.includes(k) || groups[k].some(v=>scope.includes(v)));
      if(!scopeKeys.length) return true;
      return scopeKeys.some(k=>groups[k].some(v=>phase.includes(v)||v.includes(phase)));
    }
    if(state.pilotTx || Date.now()-state.lastTxAt<9000){
      addLog('AI HOLD','AI request held while user has frequency: '+label);
      await replyToBackend('hold',{reason:'user_frequency_priority',retryAfterMs:10000});
      return;
    }
    const scope=String(req.frequencyScope||ctx.controllerRole||ctx.phase||'').toUpperCase();
    const phase=String(req.phase||req.intent||'').toUpperCase();
    const intent=String(req.intent||'').toUpperCase();
    const clearanceIntent=intent.includes('CLEARANCE') || phase.includes('PRE_FLIGHT') || phase.includes('PREFLIGHT');
    const scopeOk = clearanceIntent && (scope.includes('GROUND') || scope.includes('CLEARANCE') || scope.includes('DELIVERY')) ? true : phaseAllowedInScope(scope,phase);
    if(scope && phase && !scopeOk){
      addLog('AI HOLD','AI request out of scope '+phase+' while scope='+scope+' for '+label);
      await replyToBackend('out_of_scope',{reason:'phase_scope_mismatch',retryAfterMs:15000});
      return;
    }
    const out=aiAtcInstructionFor(req||{});
    if(!out || !out.instruction || !out.readback){
      addLog('AI HOLD','No valid SkyEcho ATC instruction generated for '+label);
      await replyToBackend('deny',{reason:'no_instruction_generated'});
      return;
    }
    addLog('AI REQUEST', `${label}: ${req.text||req.intent}`);
    addLog('SKYECHO ATC→AI', out.instruction);
    let exchangeOk=false;
    try{
      exchangeOk=await runAiRadioExchange(req,out,label);
    }catch(e){
      addLog('AI RADIO SEQ ERROR','Sequencer failed for '+label+': '+((e&&e.message)||e));
    }
    if(exchangeOk){
      aiTrafficProgressionCommit(req,out);
      try{
        await api('/traffic/ai-atc-instruction',{secret:state.secret,requestId:req.requestId,callsign:req.callsign,status:'instruction',instruction:out.instruction,readback:out.readback,nextPhase:out.nextPhase,...ctx},true);
        addLog('AI BRIDGE','Instruction posted to backend for '+label+' after audible exchange.');
      }catch(e){
        addLog('AI BRIDGE ERROR','instruction post failed for '+label+': '+((e&&e.message)||e));
      }
    }else{
      addLog('AI BRIDGE','Instruction NOT posted for '+label+' because full audible request/controller/readback sequence did not complete.');
    }
    if(req.requestId && state.aiBridgeInFlight) delete state.aiBridgeInFlight[req.requestId];
    aiHoldRadio(2200,'AI readback release');
    setTimeout(()=>{ try{ drainBackendAudioQueue(); }catch(_){} },700);
  }

  function normalizeAiIntentFromPending(a){
    const id=String(a&&a.pendingRequestId||'').toLowerCase();
    const phase=String(a&&a.phase||'').toUpperCase();
    if(id.includes('ifr_clearance')||phase.includes('PRE_FLIGHT')) return 'ifr_clearance';
    if(id.includes('taxi_in')||phase.includes('TAXI_IN')||phase.includes('AFTER_LANDING')) return 'taxi_in';
    if(id.includes('taxi')||phase.includes('TAXI')) return 'taxi';
    if(id.includes('takeoff')||phase.includes('TAKEOFF')||phase.includes('HOLD_SHORT')) return 'takeoff';
    if(id.includes('landing')||phase.includes('LANDING')||phase.includes('FINAL')) return 'landing';
    if(id.includes('approach')||phase.includes('APPROACH')) return 'approach';
    if(id.includes('descent')||phase.includes('DESCENT')) return 'descent';
    return id.split('-').pop() || 'ifr_clearance';
  }
  function synthesizeAiRequestFromAircraft(a){
    if(!a || !a.pendingRequestId) return null;
    const intent=normalizeAiIntentFromPending(a);
    const radio=a.radio||{};
    const cs=a.callsign||a.spokenCallsign||a.icao24||'AI traffic';
    const spoken=a.spokenCallsign||cs;
    const route=Array.isArray(a.route)?a.route.join(' '):(a.route||'DCT');
    const dest=a.dest||a.destination||'';
    const controller=intent==='ifr_clearance' ? 'Clearance' : (radio.controller||'Clearance');
    const runway=a.assignedRunway||a.runway||'07';
    let text='';
    if(intent==='ifr_clearance') text=`${controller}, ${spoken}, request IFR clearance to ${dest||'destination'}.`;
    else if(intent==='taxi') text=`${controller}, ${spoken}, ready to taxi.`;
    else if(intent==='takeoff') text=`${controller}, ${spoken}, holding short runway ${runway}, ready for departure.`;
    else if(intent==='landing') text=`${controller}, ${spoken}, established final runway ${runway}.`;
    else if(intent==='approach') text=`${controller}, ${spoken}, request approach runway ${runway}.`;
    else if(intent==='descent') text=`${controller}, ${spoken}, request descent.`;
    else if(intent==='taxi_in') text=`${controller}, ${spoken}, clear of runway ${runway}, request taxi to the gate.`;
    else text=`${controller}, ${spoken}, ${intent}.`;
    return {
      type:'ai_pilot_request',

      callsign:cs,
      spokenCallsign:spoken,
      text,
      intent,
      phase:a.phase||'',
      frequencyScope:intent==='ifr_clearance' ? 'Clearance' : (radio.controller||''),
      frequency:radio.frequency||'',
      origin:a.origin||'',

  function processPendingAiRequestsFromState(j){
    try{
      if(!aiTrafficEnabledForFrontend()) return;
      state.aiBridgeSeen=state.aiBridgeSeen||{};
      const arr=(j&&j.aircraft)||state.aircraft||[];
      const now=Date.now();
      Object.keys(state.aiBridgeSeen).forEach(k=>{ if(now-state.aiBridgeSeen[k]>120000) delete state.aiBridgeSeen[k]; });
      for(const a of arr){
        const rid=a&&a.pendingRequestId;
        if(!rid || state.aiBridgeSeen[rid]) continue;
        const req=synthesizeAiRequestFromAircraft(a);
        if(!req) continue;
        const proc=aiEnsureAircraftState(req,a);
        if(!aiTrafficProgressionAllowed(req,a)){
          // Mark stale/off-scope request as seen briefly so it does not hammer the radio, but let backend retry later.
          state.aiBridgeSeen[rid]=Date.now();
          continue;

        state.aiBridgeInFlight=state.aiBridgeInFlight||{};

        handleAiPilotRequest(req).then(()=>{
          state.aiBridgeSeen[rid]=Date.now();
          if(state.aiBridgeInFlight) delete state.aiBridgeInFlight[rid];
        }).catch(e=>{
          if(state.aiBridgeInFlight) delete state.aiBridgeInFlight[rid];
          delete state.aiBridgeSeen[rid];
          addLog('AI BRIDGE ERROR','poll fallback failed for '+(req.spokenCallsign||req.callsign||'AI traffic')+': '+((e&&e.message)||e));
        });
        // One aircraft per poll tick keeps the frequency realistic and prevents stacked readbacks.
        break;
      }

  }
  // v6.9.12: any visible Start/Keep Traffic click arms AI audio for this page session.
  if(!window.__skyechoAiTrafficArmClickInstalled){

  function handleMessage(m){ if(m.type==='hello'){const tr=m.traffic||{}; state.trafficRunning=!!tr.running; state.aircraft=tr.aircraft||[]; processPendingAiRequestsFromState(tr); renderAircraft(); addLog('HELLO',JSON.stringify({service:m.service,running:state.trafficRunning,aircraft:state.aircraft.length,data:m.data&&m.data.source},null,2)); updateStatus(); if(state.trafficRunning && !state.desiredTraffic){ addLog('SYSTEM','Backend traffic is already running; AI audio will stay muted until you press Enable Audio and Start/Keep Traffic.'); }}

    else if(m.type==='traffic_started'){state.trafficRunning=true;updateStatus();addLog('SYSTEM','Backend traffic started.'); if(m.state){state.aircraft=m.state.aircraft||[];renderAircraft();}}
    else if(m.type==='traffic_stopped'){state.trafficRunning=false;updateStatus();addLog('SYSTEM','Backend traffic stopped.'); state.aircraft=[];renderAircraft();}
    else if(m.type==='user_atc_response'){addLog('ATC',(m.result&&m.result.response)||JSON.stringify(m.result||m)); const u=getBackendAudioUrl(m.result||{},m); if(u) enqueueBackendAudio(m.result||{},m,false);}
    else if(m.type==='log'){addLog((m.entry&&m.entry.type)||'LOG',(m.entry&&m.entry.text)||JSON.stringify(m.entry)); const u=getBackendAudioUrl(m.entry||{},m); if(u) enqueueBackendAudio(m.entry||{},m,false);}
  }
  function getBackendAudioUrl(ev,m){ const raw=(ev&& (ev.audioUrl||ev.audio_url||ev.audioPath||ev.audio_path||ev.url||ev.path)) || (m&&(m.audioUrl||m.audio_url||m.audioPath||m.audio_path||m.url||m.path)); if(!raw) return ''; const str=String(raw); if(/^https?:\/\//i.test(str)) return str; if(str.startsWith('/')) return base()+str; return base()+'/'+str.replace(/^\.\//,''); }
  function backendAudioUnlocked(){ return !!(window.__skyechoAudioUnlocked||window.__skyechoBackendAudioUnlocked||localStorage.getItem(LS+'audioUnlocked')==='1'); }
  function unlockBackendAudio(){ window.__skyechoBackendAudioUnlocked=true; localStorage.setItem(LS+'audioUnlocked','1'); try{ const A=window.AudioContext||window.webkitAudioContext; if(A){ const c=window.__skyechoBackendAudioCtx||(window.__skyechoBackendAudioCtx=new A()); if(c.state==='suspended') c.resume().catch(()=>{}); } }catch(_){} }
  function clearBackendAudioQueue(reason){ try{ state.audioQueue=[]; if(state.currentBackendAudio){ state.currentBackendAudio.pause(); state.currentBackendAudio.src=''; state.currentBackendAudio=null; } state.audioPlaying=false; if(reason) addLog('AUDIO CLEAR','Cleared AI audio: '+reason); }catch(_){} }
  function enqueueBackendAudio(ev,m,held){ const url=getBackendAudioUrl(ev,m); if(!url) return; state.audioQueue=state.audioQueue||[]; state.audioQueue.push({url,role:(ev&&ev.role)||m.role||'radio',text:(ev&&ev.text)||m.text||'',held:!!held,t:Date.now()}); addLog('AUDIO', (held?'queued after PTT: ':'queued: ')+url.replace(base(),'')); drainBackendAudioQueue(); }
  async function drainBackendAudioQueue(){ if(state.audioPlaying) return; if(aiRadioBusy() || state.pilotTx || Date.now()-state.lastTxAt<2200){ setTimeout(drainBackendAudioQueue,900); return; } const q=state.audioQueue||[]; const item=q.shift(); if(!item) return; if(aiRadioBusy() || state.pilotTx || Date.now()-state.lastTxAt<2200){ q.unshift(item); setTimeout(drainBackendAudioQueue,900); return; } if(!backendAudioUnlocked()){ addLog('AUDIO','Playback locked by browser. Click Enable SkyEcho Audio or Start SkyEcho AI Traffic once.'); q.unshift(item); return; } state.audioPlaying=true; aiHoldRadio(2000,'backend traffic audio starting'); try{ await playBackendAudio(item.url); addLog('AUDIO PLAYED', (item.role||'radio')+' '+item.url.replace(base(),'')); }catch(e){ addLog('AUDIO ERROR', (e&&e.message)||String(e)); } finally{ state.audioPlaying=false; aiHoldRadio(900,'backend traffic audio tail'); setTimeout(drainBackendAudioQueue,700); } }
  function playBackendAudio(url){ return new Promise((resolve,reject)=>{ try{ const a=new Audio(url); let done=false,started=false; const timer=setTimeout(()=>{ if(done)return; try{ if(!a.paused&&!a.ended)a.pause(); }catch(_){} done=true; try{a.remove();}catch(_){} if(state.currentBackendAudio===a) state.currentBackendAudio=null; started?resolve():reject(new Error('backend audio playback did not start before timeout')); },24000); function finish(ok,err){ if(done)return; done=true; clearTimeout(timer); try{a.remove();}catch(_){} if(state.currentBackendAudio===a) state.currentBackendAudio=null; ok?resolve():reject(err||new Error('backend audio playback failed')); } state.currentBackendAudio=a; a.preload='auto'; a.playsInline=true; a.volume=1.0; a.style.display='none'; try{document.body.appendChild(a);}catch(_){} a.onplaying=()=>{started=true;}; a.onended=()=>finish(true); a.onerror=()=>finish(false,new Error('backend audio playback failed')); try{ unlockBackendAudio&&unlockBackendAudio(); }catch(_){} const pp=a.play(); if(pp&&pp.catch)pp.catch(err=>finish(false,err)); }catch(e){reject(e)} }); }
  async function health(){save(); const j=await api('/health'); addLog('HEALTH',JSON.stringify(j,null,2)); return j;}

  async function prepareBackend(){ if(state.booting) return; state.booting=true; try{ await health().catch(e=>addLog('ERROR','Health failed: '+e.message)); let d=await dataStatus().catch(e=>null); const loaded=d && d.loadedFiles ? d.loadedFiles.length : 0; if(!d || d.source==='local' || loaded===0) await syncData().catch(e=>addLog('ERROR','CSV sync failed: '+e.message)); state.prepared=true; addLog('READY','Backend prepared. Traffic is on standby until you start it or start a session.'); addLog('NAVDATA','v6.9.26 CSV/AIP approach guard active: uses loaded NASR/AIP airport/runway/frequency/procedure data when backend exposes it; otherwise applies Caribbean-safe 3000 ft approach floor.'); toast('SkyEcho backend ready. Traffic on standby.'); } finally{state.booting=false;} }

  async function testPilot(){save(); const text=qs('be57_test').value.trim(); if(!text) return; markPilotTx(1800); const ctx=getSkyEchoContext(); const j=await api('/traffic/pilot-event',{secret:state.secret,text,callsign:'BWA268',userCallsign:'BWA268',airport:state.airport,origin:state.airport,runway:'07',...ctx},true); addLog('PILOT',text); if(j.result) addLog('ATC',j.result.response||JSON.stringify(j.result)); else addLog('ATC',JSON.stringify(j,null,2)); return j;}
  function markPilotTx(ms){state.pilotTx=true;state.lastTxAt=Date.now(); clearBackendAudioQueue('pilot transmit'); try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(_){} const ctx=getSkyEchoContext(); api('/traffic/user-priority',{secret:state.secret,callsign:'BWA268',userCallsign:'BWA268',airport:state.airport,origin:state.airport,runway:'07',pttActive:true,transmitting:true,holdMs:ms||10000,reason:'pilot transmit',...ctx},true).catch(()=>{}); setTimeout(()=>{state.pilotTx=false;},ms||1800);}
  function renderAircraft(){const el=qs('be57_aircraft'); if(!el) return; const arr=state.aircraft||[]; if(!arr.length){el.textContent=state.trafficRunning?'Traffic running, waiting for ADS-B feed...':'Traffic standby. Use PTT normally; start AI traffic only when ready.'; return;} el.innerHTML=arr.slice(0,22).map(a=>{const cs=a.spokenCallsign||a.callsign||a.icao24;const fp=a.flight_plan||{};const tel=a.telemetry||a.position||{};const sq=a.squawk||fp.squawk||UxV37AssignSquawk(cs); const adsb=a.icao24||a.hex||('SE'+String(sq).padStart(4,'0')); return `<div class="be-log"><b>${escapeHtml(cs)}</b> <span style="opacity:.75">ADS-B ${escapeHtml(adsb)} SQ ${escapeHtml(sq)}</span><br>${escapeHtml(fp.phase||a.phase||'')} ${escapeHtml(fp.origin||a.origin||'')}→${escapeHtml(fp.dest||a.dest||'')} alt ${escapeHtml(tel.alt||a.altitude||'0')} hdg ${escapeHtml(tel.hdg||a.heading||'---')}</div>`}).join('');}

  function render(){ if(qs('skyechoBackendPanelV57')) return; const pos=JSON.parse(localStorage.getItem(LS+'pos')||'null'); const p=document.createElement('div'); p.id='skyechoBackendPanelV57'; if(state.min) p.classList.add('min'); if(pos){p.style.left=pos.left+'px';p.style.top=pos.top+'px';} p.innerHTML=`
    <div class="be-head" id="be57_drag"><div><h3>SkyEcho Backend AI Engine v6.9.25</h3><div class="be-sub"><span id="be57_dot" class="dot"></span><span id="be57_status">offline</span></div><span id="be57_pill" class="status-pill">Traffic: standby</span></div><button class="be-min" id="be57_min">${state.min?'+':'–'}</button></div>

</style>
<script id="skyechoTrafficV2OnlyScript">
(function(){
  if(window.__skyechoTrafficV2OnlyV6939)return;
  window.__skyechoTrafficV2OnlyV6939=true;

  const DEFAULT_URL='https://skyecho-backend-ai-traffic-orchestrator.onrender.com';
  const LOCKED_SECRET='choose_a_private_secret';
  const LS='skyecho_traffic_v2_only_';

  function qs(id){return document.getElementById(id)}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function stamp(){return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});}
  function base(){return (localStorage.getItem(LS+'url')||DEFAULT_URL).replace(/\/+$/,'')}
  function secret(){return localStorage.getItem(LS+'secret')||LOCKED_SECRET}
  function inferDest(origin){
    const o=String(origin||'').toUpperCase();
    if(o==='TKPK')return 'TAPA';
    if(o==='TAPA')return 'TKPK';
    if(o==='KMCO')return 'KJFK';
    if(o==='KJFK')return 'KMCO';
    return 'TAPA';
  }
  function inferRunway(airport){
    const a=String(airport||'').toUpperCase();
    if(a==='KMCO')return '36R';
    if(a==='TKPK'||a==='TAPA')return '07';
    return '07';
  }
  function inferRoute(origin,dest){
    const o=String(origin||'').toUpperCase(), d=String(dest||'').toUpperCase();
    if(o==='TKPK'&&d==='TAPA')return 'SKB G633 ANU';
    if(o==='TAPA'&&d==='TKPK')return 'ANU G633 SKB';
    if(o==='KMCO'&&d==='KJFK')return 'MZULO3 ETECK DCT PELCN Y309 FLRDA DCT SAGGY DCT CHIEZ Q161 KALDA Q108 SIE CAMRN5';
    return 'DCT';
  }
  function inferFrequency(airport){
    const a=String(airport||'').toUpperCase();
    if(a==='KMCO')return '121.80';
    if(a==='TAPA')return '121.90';
    if(a==='TKPK')return '121.90';
    return '121.90';
  }
  async function api(path,body){
    const opts=body?{
      method:'POST',
      headers:{'Content-Type':'application/json','x-bridge-secret':secret()},
      body:JSON.stringify(body)
    }:{method:'GET'};
    const r=await fetch(base()+path,opts);
    const t=await r.text();
    let j; try{j=JSON.parse(t)}catch(_){j={ok:r.ok,status:r.status,text:t}}
    if(!r.ok && !j.ok) throw new Error(j.error||j.text||('HTTP '+r.status));
    return j;
  }


  // v6.9.43 UltraStrict: Traffic v2 AI pilot audio playback only.
  // This does not touch PTT, STT, user ATC parser, readback validation, or route sequencing.
  // It listens only for backend traffic_v2_radio events, sends that AI-pilot text to backend Piper,
  // plays the returned WAV, then releases /traffic-v2/audio-finished.
  function trafficV2AudioLog(type,msg){
    try{
      const el=qs('tr_rescue_logs');
      const line={type:String(type||'AUDIO'),msg:String(msg||''),t:stamp()};
      window.__skyechoTrafficV2AudioLogs=window.__skyechoTrafficV2AudioLogs||[];
      window.__skyechoTrafficV2AudioLogs.unshift(line);
      window.__skyechoTrafficV2AudioLogs.splice(24);
      if(el){
        const current=el.innerHTML||'';
        el.innerHTML=`<div class="tr-log"><b>${esc(line.t)} ${esc(line.type)}</b><br>${esc(line.msg)}</div>`+current;
      }
    }catch(_){ }
    try{console.log('[Traffic v2 Audio]',type,msg)}catch(_){ }
  }
  function trafficV2UserFrequency(){
    try{return String((qs('tr_rescue_frequency')&&qs('tr_rescue_frequency').value)||localStorage.getItem(LS+'frequency')||'').trim()}catch(_){return ''}
  }
  function trafficV2SameFrequency(ev){
    const user=trafficV2UserFrequency().replace(/[^0-9.]/g,'');
    const ai=String((ev&& (ev.frequency||ev.userFrequency||ev.controllerFrequency))||'').replace(/[^0-9.]/g,'');
    if(!user || !ai) return true;
    return user===ai;
  }
  function trafficV2EventText(ev){
    return String((ev&& (ev.transmission||ev.text||ev.message||ev.readback))||'').trim();
  }
  function trafficV2AbsoluteAudioUrl(raw){
    const s=String(raw||'').trim();
    if(!s) return '';
    if(/^https?:\/\//i.test(s)) return s;
    if(s.startsWith('/')) return base()+s;
    return base()+'/'+s.replace(/^\.\//,'');
  }
  function armTrafficV2PiperPlayback(){
    window.__skyechoTrafficV2Stopped=false;
    window.__skyechoTrafficV2PiperArmed=true;
    try{
      const A=window.AudioContext||window.webkitAudioContext;
      if(A){
        const c=window.__skyechoTrafficV2AudioCtx||(window.__skyechoTrafficV2AudioCtx=new A());
        if(c.state==='suspended') c.resume().catch(()=>{});
      }
    }catch(_){ }
    trafficV2AudioLog('AUDIO','Traffic v2 Piper playback armed. AI radio will play through backend Piper WAV and release the queue after audio ends.');
    connectTrafficV2AudioSocket();
  }
  async function releaseTrafficV2Queue(reason){
    try{
      await api('/traffic-v2/audio-finished',{});
      trafficV2AudioLog('QUEUE','Released Traffic v2 queue'+(reason?': '+reason:''));
    }catch(e){
      trafficV2AudioLog('QUEUE ERROR',(e&&e.message)||String(e));
    }
  }
  function playTrafficV2Wav(url){
    return new Promise((resolve,reject)=>{
      try{
        const a=new Audio(url);
        let done=false,started=false;
        const timer=setTimeout(()=>{
          if(done) return;
          done=true;
          try{a.pause();a.src='';a.remove();}catch(_){ }
          started?resolve():reject(new Error('Traffic v2 WAV did not start before timeout'));
        },30000);
        function finish(ok,err){
          if(done) return;
          done=true;clearTimeout(timer);
          try{a.remove();}catch(_){ }
          ok?resolve():reject(err||new Error('Traffic v2 WAV playback failed'));
        }
        a.preload='auto'; a.playsInline=true; a.volume=1.0; a.style.display='none';
        try{document.body.appendChild(a)}catch(_){ }
        a.onplaying=()=>{started=true;trafficV2AudioLog('AUDIO PLAYING',url.replace(base(),''));};
        a.onended=()=>finish(true);
        a.onerror=()=>finish(false,new Error('Traffic v2 WAV playback error'));
        const p=a.play();
        if(p&&p.catch)p.catch(err=>finish(false,err));
      }catch(e){reject(e)}
    });
  }
  async function handleTrafficV2RadioEvent(ev){
    ev=ev||{};
    const text=trafficV2EventText(ev);
    const callsign=String(ev.callsign||ev.aircraftCallsign||ev.id||'TRAFFIC').trim();
    if(!text){
      trafficV2AudioLog('RADIO SKIP','Traffic v2 radio event had no text/transmission.');
      await releaseTrafficV2Queue('empty traffic event');
      return;
    }
    if(!trafficV2SameFrequency(ev)){
      trafficV2AudioLog('RADIO OFF FREQ',`${callsign} ${ev.frequency||''}: ${text}`);
      await releaseTrafficV2Queue('off-frequency traffic hidden');
      return;
    }
    if(window.__skyechoTrafficV2Stopped){trafficV2AudioLog('STOPPED','Traffic v2 audio blocked because traffic is stopped.');return;}
    if(!window.__skyechoTrafficV2PiperArmed){
      trafficV2AudioLog('AUDIO LOCKED','Click Start Traffic v2 once to unlock browser audio.');
      return;
    }
    window.__skyechoTrafficV2PiperQueue=window.__skyechoTrafficV2PiperQueue||[];
    window.__skyechoTrafficV2PiperQueue.push({ev,text,callsign});
    drainTrafficV2PiperQueue();
  }
  async function drainTrafficV2PiperQueue(){
    if(window.__skyechoTrafficV2Stopped){window.__skyechoTrafficV2PiperQueue=[];window.__skyechoTrafficV2PiperPlaying=false;return;}
    if(window.__skyechoTrafficV2PiperPlaying) return;
    const q=window.__skyechoTrafficV2PiperQueue||[];
    const item=q.shift();
    if(!item) return;
    window.__skyechoTrafficV2PiperPlaying=true;
    try{
      trafficV2AudioLog('RADIO RX',`${item.callsign}: ${item.text}`);
      const voice=await api('/voice/test',{
        role:'traffic',
        callsign:item.callsign,
        spokenCallsign:item.ev.spokenCallsign||item.ev.spoken||item.callsign,
        frequency:item.ev.frequency||trafficV2UserFrequency(),
        text:item.text
      });
      const v=voice.voice||voice;
      const audioUrl=trafficV2AbsoluteAudioUrl(v.audioUrl||v.audioPath||v.path||'');
      if(!audioUrl) throw new Error('backend Piper returned no audioUrl');
      trafficV2AudioLog('PIPER',`${v.voiceName||'voice'} ${audioUrl.replace(base(),'')}`);
      await playTrafficV2Wav(audioUrl);
      await releaseTrafficV2Queue('AI traffic audio ended');
    }catch(e){
      trafficV2AudioLog('AUDIO ERROR',(e&&e.message)||String(e));
      await releaseTrafficV2Queue('audio error fallback');
    }finally{
      window.__skyechoTrafficV2PiperPlaying=false;
      setTimeout(drainTrafficV2PiperQueue,700);
    }
  }
  function connectTrafficV2AudioSocket(){
    try{
      if(window.__skyechoTrafficV2AudioWs && window.__skyechoTrafficV2AudioWs.readyState<=1) return;
      const wsBase=base().replace(/^http/i,'ws');
      const ws=new WebSocket(wsBase+'/ws');
      window.__skyechoTrafficV2AudioWs=ws;
      ws.onopen=()=>trafficV2AudioLog('WS','Traffic v2 audio socket connected.');
      ws.onclose=()=>trafficV2AudioLog('WS','Traffic v2 audio socket closed.');
      ws.onerror=()=>trafficV2AudioLog('WS ERROR','Traffic v2 audio socket error.');
      ws.onmessage=e=>{
        try{
          const m=JSON.parse(e.data);
          if(m.type==='traffic_v2_radio') handleTrafficV2RadioEvent(m.event||m.radio||m);
        }catch(err){trafficV2AudioLog('WS PARSE ERROR',(err&&err.message)||String(err));}
      };
    }catch(e){trafficV2AudioLog('WS ERROR',(e&&e.message)||String(e));}
  }
  window.__skyechoTrafficV2ArmPiperPlayback=armTrafficV2PiperPlayback;

  // Stop older frontend injection from being started by old buttons/functions.
  // These redirects deliberately target Traffic v2 only.
  window.__skyechoStartBackendTraffic = async function(){
    return window.__skyechoTrafficV2Start ? window.__skyechoTrafficV2Start() : null;
  };
  window.__skyechoPrepareBackendTraffic = async function(){
    return window.__skyechoTrafficV2State ? window.__skyechoTrafficV2State() : null;
  };
  try{
    window.__skyechoTrafficDensity = 0;
    window.__skyechoTrafficState = [];
    window.__skyechoTrafficQueue = [];
    localStorage.setItem('skyecho_ai_traffic_frontend_disabled','1');
    localStorage.setItem('skyecho_traffic_density','0');
  }catch(_){}

  // Hide old backend traffic UI to remove the two-panel confusion.
  function hideOldTrafficUis(){
    try{
      const old=document.getElementById('skyechoBackendDock');
      if(old){old.style.display='none';old.style.visibility='hidden';old.style.pointerEvents='none';}
      const old2=document.getElementById('skyechoBackendPanelV57');
      if(old2){old2.style.display='none';old2.style.visibility='hidden';old2.style.pointerEvents='none';}
      document.querySelectorAll('button').forEach(btn=>{
        const label=(btn.textContent||'').trim().toLowerCase();
        if(label==='backend ui'||label==='start traffic session'){
          btn.style.display='none';
          btn.disabled=true;
        }
      });
    }catch(_){}
  }

  // Weather: make the missing backend aviation-weather route resolve through aviationweather.gov.
  // This prevents "Backend weather failed: HTTP 404" without touching the app weather UI code.
  if(!window.__skyechoWeatherFallbackV6939){
    window.__skyechoWeatherFallbackV6939=true;
    const originalFetch=window.fetch.bind(window);
    window.fetch=async function(input,init){
      const url=typeof input==='string'?input:(input&&input.url)||'';
      if(/\/api\/weather\/aviation\?icao=/i.test(url)){
        try{
          const u=new URL(url, window.location.href);
          const icao=(u.searchParams.get('icao')||'').toUpperCase();
          if(icao){
            const metarUrl=`https://aviationweather.gov/api/data/metar?ids=${encodeURIComponent(icao)}&format=json`;
            const tafUrl=`https://aviationweather.gov/api/data/taf?ids=${encodeURIComponent(icao)}&format=json`;
            const [mr,tr]=await Promise.allSettled([
              originalFetch(metarUrl,{cache:'no-store'}).then(r=>r.ok?r.json():[]),
              originalFetch(tafUrl,{cache:'no-store'}).then(r=>r.ok?r.json():[])
            ]);
            const m=(mr.status==='fulfilled'&&(Array.isArray(mr.value)?mr.value[0]:mr.value))||{};
            const t=(tr.status==='fulfilled'&&(Array.isArray(tr.value)?tr.value[0]:tr.value))||{};
            const payload={
              ok:true,
              source:'aviationweather.gov frontend fallback',
              airport:icao,
              metar:m.rawOb||m.raw_text||m.rawMetar||m.metar||'',
              taf:t.rawTAF||t.raw_text||t.rawTaf||t.taf||'',
              activeRunway:'',
              wind:'',
              notams:''
            };
            return new Response(JSON.stringify(payload),{
              status:200,
              headers:{'Content-Type':'application/json'}
            });
          }
        }catch(e){
          return new Response(JSON.stringify({ok:true,source:'frontend weather fallback',metar:'',taf:'',status:'Weather unavailable: '+((e&&e.message)||e)}),{
            status:200,
            headers:{'Content-Type':'application/json'}
          });
        }
      }
      return originalFetch(input,init);
    };
  }

  function makeDrag(panel,handle){
    let down=false,dx=0,dy=0;
    handle.addEventListener('pointerdown',e=>{
      if(e.target&&e.target.tagName==='BUTTON')return;
      down=true;dx=e.clientX-panel.offsetLeft;dy=e.clientY-panel.offsetTop;
      try{handle.setPointerCapture(e.pointerId)}catch(_){}
    });
    handle.addEventListener('pointermove',e=>{
      if(!down)return;
      const left=Math.max(4,Math.min(window.innerWidth-panel.offsetWidth-4,e.clientX-dx));
      const top=Math.max(4,Math.min(window.innerHeight-60,e.clientY-dy));
      panel.style.left=left+'px';panel.style.top=top+'px';
    });
    handle.addEventListener('pointerup',()=>{
      if(!down)return;down=false;
      try{localStorage.setItem(LS+'pos',JSON.stringify({left:panel.offsetLeft,top:panel.offsetTop}))}catch(_){}
    });
  }

  function buildPanel(){
    hideOldTrafficUis();
    const existing=qs('skyechoTrafficRescuePanel');
    if(existing) existing.remove();

    const pos=(()=>{try{return JSON.parse(localStorage.getItem(LS+'pos')||'null')}catch(_){return null}})();
    const airport=(localStorage.getItem(LS+'airport')||'TKPK').toUpperCase();
    const dest=(localStorage.getItem(LS+'dest')||inferDest(airport)).toUpperCase();
    const runway=(localStorage.getItem(LS+'runway')||inferRunway(airport)).toUpperCase();
    const route=localStorage.getItem(LS+'route')||inferRoute(airport,dest);
    const freq=localStorage.getItem(LS+'frequency')||inferFrequency(airport);
    const density=localStorage.getItem(LS+'density')||'4';

    const p=document.createElement('div');
    p.id='skyechoTrafficRescuePanel';
    if(pos){p.style.left=pos.left+'px';p.style.top=pos.top+'px'}

    p.innerHTML=`<div class="tr-head" id="tr_rescue_drag">
      <div>
        <h3>SkyEcho AI Traffic v2</h3>
        <div class="tr-sub"><span id="tr_rescue_dot" class="dot"></span><span id="tr_rescue_status">Traffic v2 only</span></div>
        <span id="tr_rescue_pill" class="status-pill">Traffic v2: standby</span>
      </div>
      <button class="tr-min" id="tr_rescue_min">–</button>
    </div>
    <div class="tr-body">
      <div class="row">
        <div><label>Origin Airport</label><input id="tr_rescue_airport" value="${esc(airport)}"></div>
        <div><label>Density</label><select id="tr_rescue_density">${[1,2,3,4,5,6,8,10].map(n=>`<option ${String(n)===String(density)?'selected':''}>${n}</option>`).join('')}</select></div>
      </div>
      <div class="row">
        <div><label>Destination</label><input id="tr_rescue_dest" value="${esc(dest)}"></div>
        <div><label>Runway</label><input id="tr_rescue_runway" value="${esc(runway)}"></div>
      </div>
      <label>Route / Procedure Flow</label>
      <input id="tr_rescue_route" value="${esc(route)}">
      <label>User Tuned Frequency</label>
      <input id="tr_rescue_frequency" value="${esc(freq)}">
      <div class="tiny">Only Traffic v2 is active here. Old frontend traffic/session injection is hidden and redirected.</div>
      <div class="btns">
        <button class="tr-btn" id="tr_rescue_start">Start Traffic v2</button>
        <button class="tr-btn secondary" id="tr_rescue_prepare">Health</button>
        <button class="tr-btn secondary" id="tr_rescue_state">State</button>
        <button class="tr-btn secondary" id="tr_rescue_adsb">ADS-B</button>
        <button class="tr-btn warn" id="tr_rescue_stop">Stop</button>
      </div>
      <label>Aircraft / ADS-B</label>
      <div class="tr-list" id="tr_rescue_aircraft">Traffic v2 standby.</div>
      <label>Traffic v2 Logs</label>
      <div class="tr-list" id="tr_rescue_logs">No Traffic v2 logs yet.</div>
    </div>`;

    document.body.appendChild(p);

    const logs=[];
    function log(type,msg){
      logs.unshift({type,msg,t:stamp()});
      logs.splice(36);
      const el=qs('tr_rescue_logs');
      if(el)el.innerHTML=logs.map(l=>`<div class="tr-log"><b>${esc(l.t)} ${esc(l.type)}</b><br>${esc(l.msg)}</div>`).join('');
    }
    function setStatus(on,running,count){
      const d=qs('tr_rescue_dot'),s=qs('tr_rescue_status'),pill=qs('tr_rescue_pill');
      if(d)d.className='dot '+(on?'on':'');
      if(s)s.textContent=on?'backend reachable':'offline';
      if(pill)pill.textContent=running?`Traffic v2: running${Number.isFinite(count)?' • '+count+' aircraft':''}`:'Traffic v2: standby';
    }
    function form(){
      const origin=(qs('tr_rescue_airport').value||'TKPK').toUpperCase().trim();
      const dest=(qs('tr_rescue_dest').value||inferDest(origin)).toUpperCase().trim();
      const runway=(qs('tr_rescue_runway').value||inferRunway(origin)).toUpperCase().trim();
      const route=(qs('tr_rescue_route').value||inferRoute(origin,dest)).toUpperCase().trim();
      const density=Number(qs('tr_rescue_density').value||4);
      const userFrequency=(qs('tr_rescue_frequency').value||inferFrequency(origin)).trim();
      try{
        localStorage.setItem(LS+'airport',origin);
        localStorage.setItem(LS+'dest',dest);
        localStorage.setItem(LS+'runway',runway);
        localStorage.setItem(LS+'route',route);
        localStorage.setItem(LS+'density',String(density));
        localStorage.setItem(LS+'frequency',userFrequency);
      }catch(_){}
      return {airport:origin,origin,dest,runway,route,density,userFrequency,source:'floating_ui_traffic_v2_only'};
    }
    function renderState(j, label){
      const state=j.state||j;
      const arr=state.aircraft||[];
      setStatus(true,!!state.running,arr.length);
      const el=qs('tr_rescue_aircraft');
      if(el){
        el.innerHTML=arr.length?arr.slice(0,30).map(a=>{
          const adsb=a.adsb||{};
          const route=(a.routeState&&a.routeState.elements||[]).map(x=>`${x.token}:${x.type}`).join(' ');
          return `<div class="tr-log"><b>${esc(a.callsign||'Traffic')} SQK ${esc(a.squawk||'')}</b><br>${esc(a.phase||'')} ${esc(a.origin||'')}→${esc(a.destination||a.dest||'')} ${esc(a.frequency||'')}<br>ALT ${esc(Math.round(adsb.altitude||0))} HDG ${esc(Math.round(adsb.heading||0))} GS ${esc(Math.round(adsb.groundSpeed||0))}<br>${esc(route)}</div>`;
        }).join(''):(state.running?'Traffic v2 running, waiting for aircraft list...':'Traffic v2 standby.');
      }
      if(label)log(label,JSON.stringify({ok:true,running:!!state.running,aircraftCount:arr.length,radio:state.radio||null}).slice(0,1200));
    }
    async function health(){
      try{const j=await api('/traffic-v2/health');setStatus(true,false);log('HEALTH',JSON.stringify(j).slice(0,1200))}
      catch(e){setStatus(false,false);log('ERROR','Traffic v2 health failed: '+(e.message||e))}
    }
    async function state(){
      try{const j=await api('/traffic-v2/state');renderState(j,'STATE')}
      catch(e){setStatus(false,false);log('ERROR','Traffic v2 state failed: '+(e.message||e))}
    }
    async function adsb(){
      try{
        const j=await api('/traffic-v2/adsb');
        const arr=j.aircraft||[];
        const el=qs('tr_rescue_aircraft');
        if(el)el.innerHTML=arr.length?arr.map(a=>`<div class="tr-log"><b>${esc(a.callsign)} SQK ${esc(a.squawk)}</b><br>${esc(a.phase)} ${esc(a.frequency)}<br>${esc(JSON.stringify(a.adsb||{}))}</div>`).join(''):'No ADS-B targets yet.';
