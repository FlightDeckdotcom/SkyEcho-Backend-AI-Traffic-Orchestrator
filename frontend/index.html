<script id="skyecho-v7104-invisible-regression-js">
(function(){
  "use strict";
  if(window.__SkyEchoV7104InvisibleUltraStrictGuard)return;
  window.__SkyEchoV7104InvisibleUltraStrictGuard=true;

  const state={blocked:0,last:"",tests:{}};

  function U(v){return String(v||"").trim().toUpperCase()}
  function session(){return window.__skyechoSession||window.__skyechoV770Session||window.__skyechoAtcSession||{}}
  function plan(){const s=session();return s.plan||window.__skyechoAtcPlan||window.__skyechoActiveFlightPlan||s||{}}
  function sid(){return U(plan().sid||plan().departureProcedure||"")}
  function star(){return U(plan().star||plan().arrivalProcedure||"")}
  function rx(x){return String(x||"").replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}
  function isProc(x){x=U(x);return !!x && /^[A-Z]{2,6}\d[A-Z0-9]?$/.test(x)}

  function wrongProcedureReport(text){
    const t=String(text||"");
    const S=sid(), R=star();
    if(S && isProc(S) && new RegExp("\\bREPORT\\s+(THE\\s+)?"+rx(S)+"\\b","i").test(t))return {kind:"SID",proc:S};
    if(R && isProc(R) && new RegExp("\\bREPORT\\s+(THE\\s+)?"+rx(R)+"\\b","i").test(t))return {kind:"STAR",proc:R};
    if(/\bREPORT\s+(THE\s+)?SID\b/i.test(t))return {kind:"SID",proc:S||"SID"};
    if(/\bREPORT\s+(THE\s+)?STAR\b/i.test(t))return {kind:"STAR",proc:R||"STAR"};
    if(/\b(report|advise)\s+(?:when\s+)?(?:on|established\s+on)\s+(?:the\s+)?[A-Z]{2,6}\d[A-Z0-9]?\s+(sid|departure)\b/i.test(t))return {kind:"SID",proc:S||"SID"};
    if(/\b(report|advise)\s+(?:when\s+)?(?:on|established\s+on)\s+(?:the\s+)?[A-Z]{2,6}\d[A-Z0-9]?\s+(star|arrival)\b/i.test(t))return {kind:"STAR",proc:R||"STAR"};
    return null;
  }

  function fixProcedureReport(text){
    const bad=wrongProcedureReport(text);
    if(!bad)return text;
    state.blocked++;
    state.last=String(text).slice(0,180);
    const cs=U(plan().callsign||"Aircraft");
    const fixed = bad.kind==="SID"
      ? (cs+", roger. Continue via the "+(sid()||"assigned departure")+". Report the first published fix after departure.")
      : (cs+", roger. Continue via the "+(star()||"assigned arrival")+". Report the next published fix, not the procedure name.");
    try{
      window.SkyEchoV7102AudioLogNoFreqTouch &&
      window.SkyEchoV7102AudioLogNoFreqTouch.addLog &&
      window.SkyEchoV7102AudioLogNoFreqTouch.addLog("Ultra Strict blocked wrong "+bad.kind+" report instruction.","warn");
    }catch(_){}
    return fixed;
  }

  function patchSpeech(){
    if(window.__SkyEchoV7104SpeechPatched||!window.speechSynthesis)return;
    window.__SkyEchoV7104SpeechPatched=true;
    const synth=window.speechSynthesis;
    const native=synth.speak?synth.speak.bind(synth):null;
    if(!native)return;
    synth.speak=function(utterance){
      try{
        if(utterance&&typeof utterance.text==="string"){
          const fixed=fixProcedureReport(utterance.text);
          if(fixed!==utterance.text)utterance.text=fixed;
        }
      }catch(_){}
      return native(utterance);
    };
  }

  function patchAudioPayloadOnly(){
    if(window.__SkyEchoV7104AudioPayloadPatched||!window.fetch)return;
    window.__SkyEchoV7104AudioPayloadPatched=true;
    const native=window.fetch.bind(window);
    window.fetch=function(input,init){
      try{
        const url=typeof input==="string"?input:(input&&input.url)||"";
        if(/tts|piper|audio|voice|speak|radio|transmission/i.test(url)&&init&&typeof init.body==="string"){
          const raw=init.body;
          if(raw.trim().startsWith("{")){
            const obj=JSON.parse(raw);
            ["text","message","transmission","speech","content","say"].forEach(k=>{
              if(typeof obj[k]==="string")obj[k]=fixProcedureReport(obj[k]);
            });
            init=Object.assign({},init,{body:JSON.stringify(obj)});
          }else{
            const fixed=fixProcedureReport(raw);
            if(fixed!==raw)init=Object.assign({},init,{body:fixed});
          }
        }
      }catch(_){}
      return native(input,init);
    };
  }

  function patchVisibleText(){
    try{
      document.querySelectorAll("*").forEach(el=>{
        if(el.children.length)return;
        const t=el.textContent||"";
        const fixed=fixProcedureReport(t);
        if(fixed!==t)el.textContent=fixed;
      });
    }catch(_){}
  }

  function runTests(){
    const S=sid()||"PALCO7", R=star()||"GOSU2G";
    const cases=[
      ["report SID", true],
      ["report STAR", true],
      ["report "+S, true],
      ["report "+R, true],
      ["report the first published fix after departure", false],
      ["report DHP", false],
      ["cleared "+S+" departure", false],
      ["descend via the "+R+" arrival", false]
    ];
    const results={};
    cases.forEach((c,i)=>{results["case_"+i]={text:c[0],expectedBlocked:c[1],blocked:!!wrongProcedureReport(c[0])}});
    results.all=Object.values(results).every(x=>x.expectedBlocked===x.blocked);
    state.tests=results;
    window.__SkyEchoUltraStrictRegressionTests=results;
    return results;
  }

  function boot(){
    patchSpeech();
    patchAudioPayloadOnly();
    patchVisibleText();
    runTests();
  }

  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,250);
  setTimeout(boot,1000);
  setInterval(()=>{patchVisibleText();runTests();},1200);

  window.SkyEchoV7104InvisibleUltraStrictGuard={
    state,
    wrongProcedureReport,
    fixProcedureReport,
    runTests
  };
})();
</script>


<!-- SkyEcho v7.10.5 SIMBRIEF WEATHER FETCH ONLY
     Narrow network/button fix only. No ATC/frequency/telemetry/load-start changes. No new UI. -->
<script id="skyecho-v7105-simbrief-weather-js">
(function(){
  "use strict";
  if(window.__SkyEchoV7105SimbriefWeatherOnly)return;
  window.__SkyEchoV7105SimbriefWeatherOnly=true;

  const state={simbrief:null,weather:null,lastError:""};
  const CORS_PROXIES=[
    "",
    "https://api.allorigins.win/raw?url=",
    "https://corsproxy.io/?",
    "https://r.jina.ai/http://r.jina.ai/http://"
  ];

  function id(x){return document.getElementById(x)}
  function val(x){const e=id(x);return e?String(("value" in e?e.value:e.textContent)||"").trim():""}
  function setVal(x,v){
    const e=id(x);
    if(!e||v==null||String(v).trim()==="")return false;
    if("value" in e)e.value=String(v);
    else e.textContent=String(v);
    try{e.dispatchEvent(new Event("input",{bubbles:true}));e.dispatchEvent(new Event("change",{bubbles:true}))}catch(_){}
    return true;
  }
  function U(v){return String(v||"").trim().toUpperCase()}
  function log(msg,kind){
    state.lastError=kind==="error"?msg:state.lastError;
    try{window.SkyEchoV7102AudioLogNoFreqTouch&&window.SkyEchoV7102AudioLogNoFreqTouch.addLog&&window.SkyEchoV7102AudioLogNoFreqTouch.addLog(String(msg),kind==="error"?"warn":"net")}catch(_){}
    const s=id("skc-v770-status");
    if(s)s.textContent=String(msg);
    try{console[kind==="error"?"warn":"log"]("[SkyEcho v7.10.5]",msg)}catch(_){}
  }
  function timeoutFetch(url,opts,ms){
    const ctl=new AbortController();
    const t=setTimeout(()=>ctl.abort(),ms||9000);
    return fetch(url,Object.assign({},opts||{},{signal:ctl.signal})).finally(()=>clearTimeout(t));
  }
  async function fetchTextWithFallback(urls,ms){
    let last="";
    for(const url of urls){
      try{
        const r=await timeoutFetch(url,{cache:"no-store"},ms||9000);
        if(!r.ok){last="HTTP "+r.status+" "+url;continue}
        const txt=await r.text();
        if(txt&&txt.trim())return txt;
        last="empty response "+url;
      }catch(e){last=(e&&e.message)||String(e)}
    }
    throw new Error(last||"all fetch routes failed");
  }
  function extractXmlText(xml,tag){
    const m=String(xml||"").match(new RegExp("<"+tag+">([\\s\\S]*?)</"+tag+">","i"));
    return m?m[1].replace(/<!\\[CDATA\\[|\\]\\]>/g,"").trim():"";
  }
  function extractXmlNumber(xml,tag){
    const v=extractXmlText(xml,tag);
    return v?Number(v):null;
  }
  function simbriefUser(){
    return val("skc770-simbrief")||val("simbrief")||localStorage.getItem("skyecho_simbrief_id")||localStorage.getItem("simbrief_user")||"";
  }
  function cleanRoute(route){
    try{if(window.SkyEchoSourceAwareV780&&window.SkyEchoSourceAwareV780.cleanRoute)return window.SkyEchoSourceAwareV780.cleanRoute(route).join(" ")}catch(_){}
    return String(route||"").toUpperCase().replace(/[\n\r,]+/g," ").split(/\s+/).filter(Boolean).filter(t=>!/^(N|M)?\d{3}F\d{3}$|^F\d{2,3}$|^FL\d{2,3}$|^A\d{3,5}$|^\d{2,3}\/\d{2,3}$/i.test(t)).join(" ");
  }
  function applySimbriefXml(xml){
    const origin=U(extractXmlText(xml,"origin_icao")||extractXmlText(xml,"orig")||extractXmlText(xml,"origin"));
    const dest=U(extractXmlText(xml,"destination_icao")||extractXmlText(xml,"dest")||extractXmlText(xml,"destination"));
    const callsign=U(extractXmlText(xml,"callsign"));
    const aircraft=U(extractXmlText(xml,"icao_code")||extractXmlText(xml,"aircraft_icao")||extractXmlText(xml,"type"));
    const route=cleanRoute(extractXmlText(xml,"route")||extractXmlText(xml,"route_ifps")||extractXmlText(xml,"atc_route"));
    const level=extractXmlText(xml,"initial_altitude")||extractXmlText(xml,"cruise_altitude")||extractXmlText(xml,"plan_altitude");
    const depRwy=U(extractXmlText(xml,"orig_rwy")||extractXmlText(xml,"origin_runway"));
    const arrRwy=U(extractXmlText(xml,"dest_rwy")||extractXmlText(xml,"destination_runway"));
    const sid=U(extractXmlText(xml,"sid"));
    const star=U(extractXmlText(xml,"star"));
    const app=U(extractXmlText(xml,"approach"));

    setVal("skc770-dep",origin);
    setVal("skc770-arr",dest);
    setVal("skc770-callsign",callsign);
    setVal("skc770-aircraft",aircraft);
    setVal("skc770-route",route);
    setVal("skc770-cruise",String(level||"").replace(/[^\d]/g,""));
    setVal("skc770-deprwy",depRwy.replace(/^RWY/,""));
    setVal("skc770-arrrwy",arrRwy.replace(/^RWY/,""));
    setVal("skc770-sid",sid);
    setVal("skc770-star",star);
    setVal("skc770-app",app);

    const plan={origin,destination:dest,callsign,aircraft,route,level,depRwy,arrRwy,sid,star,app,updatedAt:Date.now()};
    state.simbrief=plan;
    try{localStorage.setItem("skyecho_last_simbrief",JSON.stringify(plan));localStorage.setItem("skyecho_simbrief_xml",xml.slice(0,250000))}catch(_){}
    return plan;
  }
  async function fetchSimbrief(){
    const user=simbriefUser();
    if(!user)throw new Error("Enter SimBrief username / pilot ID first.");
    try{localStorage.setItem("skyecho_simbrief_id",user)}catch(_){}
    const baseUrl="https://www.simbrief.com/api/xml.fetcher.php?username="+encodeURIComponent(user);
    const urls=[
      baseUrl,
      "https://api.allorigins.win/raw?url="+encodeURIComponent(baseUrl),
      "https://corsproxy.io/?"+encodeURIComponent(baseUrl),
      "https://r.jina.ai/http://r.jina.ai/http://https://www.simbrief.com/api/xml.fetcher.php?username="+encodeURIComponent(user)
    ];
    log("Fetching SimBrief...");
    const xml=await fetchTextWithFallback(urls,10000);
    if(!/<\?xml|<OFP|<fetch/i.test(xml))throw new Error("SimBrief returned non-XML response");
    const plan=applySimbriefXml(xml);
    if(!plan.origin&&!plan.destination&&!plan.route)throw new Error("SimBrief XML loaded but no usable flight plan fields found");
    log("SimBrief loaded: "+(plan.origin||"----")+" to "+(plan.destination||"----"));
    return plan;
  }
  function airportForWeather(){
    return U(val("skc770-dep")||val("skc770-arr")||"");
  }
  function parseMetarFromText(txt,icao){
    txt=String(txt||"");
    icao=U(icao);
    try{
      const j=JSON.parse(txt);
      if(Array.isArray(j)&&j[0]){
        return j[0].rawOb||j[0].raw_text||j[0].metar||j[0].raw||"";
      }
      if(j&&typeof j==="object"){
        if(j.rawOb||j.raw_text||j.metar||j.raw)return j.rawOb||j.raw_text||j.metar||j.raw;
        if(j.data&&Array.isArray(j.data)&&j.data[0])return j.data[0].rawOb||j.data[0].raw_text||j.data[0].metar||j.data[0].raw||"";
      }
    }catch(_){}
    const lines=txt.split(/\n+/).map(x=>x.trim()).filter(Boolean);
    const line=lines.find(l=>new RegExp("^"+icao+"\\b").test(l))||lines.find(l=>/\b(METAR|SPECI)\b/.test(l)&&l.includes(icao))||lines.find(l=>/^([A-Z]{4})\s+\d{6}Z\b/.test(l));
    return line?line.replace(/^(METAR|SPECI)\s+/,"").trim():"";
  }
  async function fetchWeather(){
    const icao=airportForWeather();
    if(!icao||icao.length<4)throw new Error("Enter departure or arrival ICAO first.");
    const awcJson="https://aviationweather.gov/api/data/metar?ids="+encodeURIComponent(icao)+"&format=json";
    const awcRaw="https://aviationweather.gov/api/data/metar?ids="+encodeURIComponent(icao)+"&format=raw";
    const avwxRaw="https://avwx.rest/api/metar/"+encodeURIComponent(icao)+"?format=json";
    const urls=[
      awcJson,
      awcRaw,
      "https://api.allorigins.win/raw?url="+encodeURIComponent(awcJson),
      "https://api.allorigins.win/raw?url="+encodeURIComponent(awcRaw),
      "https://corsproxy.io/?"+encodeURIComponent(awcJson),
      "https://corsproxy.io/?"+encodeURIComponent(awcRaw)
    ];
    log("Fetching weather for "+icao+"...");
    const txt=await fetchTextWithFallback(urls,9000);
    const metar=parseMetarFromText(txt,icao);
    if(!metar)throw new Error("Weather response loaded but no METAR found for "+icao);
    setVal("skc770-weather",metar);
    state.weather={icao,metar,updatedAt:Date.now()};
    try{localStorage.setItem("skyecho_last_weather",JSON.stringify(state.weather))}catch(_){}
    log("Weather loaded: "+metar);
    return state.weather;
  }
  function bindButton(buttonId,fn,label){
    const b=id(buttonId);
    if(!b||b.__v7105Bound)return;
    b.__v7105Bound=true;
    b.addEventListener("click",function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      fn().catch(err=>{
        const msg=(err&&err.message)||String(err);
        log(label+" failed: "+msg,"error");
      });
    },true);
  }
  function boot(){
    bindButton("skc770-fetch-simbrief",fetchSimbrief,"SimBrief");
    bindButton("skc770-fetch-weather",fetchWeather,"Weather");
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,250);
  setTimeout(boot,1000);
  setInterval(boot,2500);

  window.SkyEchoV7105SimbriefWeatherOnly={state,fetchSimbrief,fetchWeather,applySimbriefXml,parseMetarFromText};
})();
</script>


<!-- SkyEcho v7.10.6 WEATHER FALLBACK ONLY
     Weather button only. No SimBrief/ATC/frequency/load/back/audio/UI/data changes. -->
<script id="skyecho-v7106-weather-fallback-js">
(function(){
  "use strict";
  if(window.__SkyEchoV7106WeatherFallbackOnly)return;
  window.__SkyEchoV7106WeatherFallbackOnly=true;

  const state={last:null,lastError:""};

  function id(x){return document.getElementById(x)}
  function val(x){const e=id(x);return e?String(("value" in e?e.value:e.textContent)||"").trim():""}
  function setVal(x,v){
    const e=id(x);
    if(!e||v==null||String(v).trim()==="")return false;
    if("value" in e)e.value=String(v);
    else e.textContent=String(v);
    try{e.dispatchEvent(new Event("input",{bubbles:true}));e.dispatchEvent(new Event("change",{bubbles:true}))}catch(_){}
    return true;
  }
  function U(v){return String(v||"").trim().toUpperCase()}
  function log(msg,kind){
    if(kind==="error")state.lastError=String(msg);
    try{window.SkyEchoV7102AudioLogNoFreqTouch&&window.SkyEchoV7102AudioLogNoFreqTouch.addLog&&window.SkyEchoV7102AudioLogNoFreqTouch.addLog(String(msg),kind==="error"?"warn":"net")}catch(_){}
    const s=id("skc-v770-status");
    if(s)s.textContent=String(msg);
    try{console[kind==="error"?"warn":"log"]("[SkyEcho v7.10.6]",msg)}catch(_){}
  }
  function timeoutFetch(url,opts,ms){
    const ctl=new AbortController();
    const t=setTimeout(()=>ctl.abort(),ms||9000);
    return fetch(url,Object.assign({cache:"no-store"},opts||{},{signal:ctl.signal})).finally(()=>clearTimeout(t));
  }
  async function getText(url, opts){
    const r=await timeoutFetch(url,opts||{},9000);
    if(!r.ok)throw new Error("HTTP "+r.status+" "+url);
    return await r.text();
  }
  async function getJson(url, opts){
    const r=await timeoutFetch(url,opts||{},9000);
    if(!r.ok)throw new Error("HTTP "+r.status+" "+url);
    return await r.json();
  }
  function airportForWeather(){
    return U(val("skc770-dep")||val("skc770-arr")||"");
  }
  function parseMetar(txt,icao){
    txt=String(txt||"");
    icao=U(icao);
    try{
      const j=JSON.parse(txt);
      const candidates=[];
      if(Array.isArray(j))candidates.push(...j);
      else if(j&&typeof j==="object"){
        candidates.push(j);
        if(j.properties)candidates.push(j.properties);
        if(Array.isArray(j.data))candidates.push(...j.data);
        if(Array.isArray(j.features))j.features.forEach(f=>{if(f&&f.properties)candidates.push(f.properties);});
      }
      for(const o of candidates){
        const raw=o.rawOb||o.rawMessage||o.raw_text||o.metar||o.raw||o.text||"";
        if(raw&&String(raw).trim())return String(raw).replace(/^(METAR|SPECI)\s+/i,"").trim();
      }
    }catch(_){}
    const lines=txt.split(/\n+/).map(x=>x.trim()).filter(Boolean);
    for(const line of lines){
      const cleaned=line.replace(/^(METAR|SPECI)\s+/i,"").trim();
      if(new RegExp("^"+icao+"\\b").test(cleaned))return cleaned;
    }
    const any=lines.find(l=>/^([A-Z]{4})\s+\d{6}Z\b/.test(l.replace(/^(METAR|SPECI)\s+/i,"").trim()));
    return any?any.replace(/^(METAR|SPECI)\s+/i,"").trim():"";
  }
  async function fetchWeather(){
    const icao=airportForWeather();
    if(!icao||icao.length<4)throw new Error("Enter departure or arrival ICAO first.");

    // Direct official sources first. Bad 403 proxy path is intentionally not used.
    const urls=[
      {kind:"json",url:"https://aviationweather.gov/api/data/metar?ids="+encodeURIComponent(icao)+"&format=json"},
      {kind:"text",url:"https://aviationweather.gov/api/data/metar?ids="+encodeURIComponent(icao)+"&format=raw"},
      {kind:"json",url:"https://api.weather.gov/stations/"+encodeURIComponent(icao)+"/observations/latest",opts:{headers:{"Accept":"application/geo+json"}}},
      {kind:"text",url:"https://tgftp.nws.noaa.gov/data/observations/metar/stations/"+encodeURIComponent(icao)+".TXT"},
      {kind:"text",url:"https://api.allorigins.win/raw?url="+encodeURIComponent("https://tgftp.nws.noaa.gov/data/observations/metar/stations/"+icao+".TXT")},
      {kind:"text",url:"https://api.allorigins.win/raw?url="+encodeURIComponent("https://aviationweather.gov/api/data/metar?ids="+icao+"&format=raw")},
      {kind:"json",url:"https://api.allorigins.win/raw?url="+encodeURIComponent("https://aviationweather.gov/api/data/metar?ids="+icao+"&format=json")}
    ];

    log("Fetching weather for "+icao+"...");
    const errors=[];
    for(const item of urls){
      try{
        const data=item.kind==="json" ? await getJson(item.url,item.opts) : await getText(item.url,item.opts);
        const raw=typeof data==="string"?data:JSON.stringify(data);
        const metar=parseMetar(raw,icao);
        if(metar){
          setVal("skc770-weather",metar);
          state.last={icao,metar,source:item.url,updatedAt:Date.now()};
          try{localStorage.setItem("skyecho_last_weather",JSON.stringify(state.last))}catch(_){}
          log("Weather loaded: "+metar);
          return state.last;
        }
        errors.push("No METAR in "+item.url);
      }catch(e){
        errors.push((e&&e.message)||String(e));
      }
    }
    throw new Error(errors.slice(-3).join(" | "));
  }
  function installWeatherButton(){
    const old=id("skc770-fetch-weather");
    if(!old||old.__v7106WeatherOnly)return;
    const b=old.cloneNode(true);
    b.__v7106WeatherOnly=true;
    b.addEventListener("click",function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      fetchWeather().catch(err=>{
        log("Weather failed: "+((err&&err.message)||String(err)),"error");
      });
    },true);
    old.parentNode.replaceChild(b,old);
  }
  function boot(){installWeatherButton();}
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,250);
  setTimeout(boot,1000);
  setInterval(boot,2500);

  window.SkyEchoV7106WeatherFallbackOnly={state,fetchWeather,parseMetar};
})();
</script>


<!-- SkyEcho v7.10.7 SIMBRIEF FIELD FILL ONLY

  "use strict";

  const state={last:null,lastError:""};

  function id(x){return document.getElementById(x)}

  function U(v){return String(v||"").trim().toUpperCase()}

    if(!e||v==null||String(v).trim()==="")return false;

  function log(msg,kind){

    try{window.SkyEchoV7102AudioLogNoFreqTouch&&window.SkyEchoV7102AudioLogNoFreqTouch.addLog&&window.SkyEchoV7102AudioLogNoFreqTouch.addLog(String(msg),kind==="error"?"warn":"net")}catch(_){}
    const s=id("skc-v770-status");
    if(s)s.textContent=String(msg);
    try{console[kind==="error"?"warn":"log"]("[SkyEcho v7.10.7]",msg)}catch(_){}
  }
  function timeoutFetch(url,opts,ms){
    const ctl=new AbortController();
    const t=setTimeout(()=>ctl.abort(),ms||10000);
    return fetch(url,Object.assign({cache:"no-store"},opts||{},{signal:ctl.signal})).finally(()=>clearTimeout(t));
  }
  async function fetchText(url){
    const r=await timeoutFetch(url,{},10000);
    if(!r.ok)throw new Error("HTTP "+r.status+" "+url);
    return await r.text();
  }
  async function fetchTextFallback(urls){
    const errors=[];
    for(const url of urls){
      try{
        const txt=await fetchText(url);
        if(txt&&txt.trim())return txt;
        errors.push("empty "+url);
      }catch(e){errors.push((e&&e.message)||String(e))}
    }
    throw new Error(errors.slice(-3).join(" | "));
  }
  function simbriefUser(){
    return val("skc770-simbrief")||localStorage.getItem("skyecho_simbrief_id")||localStorage.getItem("simbrief_user")||"";
  }
  function decode(s){
    const ta=document.createElement("textarea");
    ta.innerHTML=String(s||"");
    return ta.value.trim();
  }
  function tag(xml, name){
    const m=String(xml||"").match(new RegExp("<"+name+"(?:\\s[^>]*)?>([\\s\\S]*?)</"+name+">","i"));
    return m?decode(m[1].replace(/<!\\[CDATA\\[|\\]\\]>/g,"")):"";
  }
  function block(xml, name){
    const m=String(xml||"").match(new RegExp("<"+name+"(?:\\s[^>]*)?>([\\s\\S]*?)</"+name+">","i"));
    return m?m[1]:"";
  }
  function first(){
    for(let i=0;i<arguments.length;i++){
      const v=arguments[i];
      if(v!=null&&String(v).trim()!=="")return String(v).trim();
    }
    return "";
  }
  function inBlock(xml, blk, tg){
    const b=block(xml,blk);
    return b?tag(b,tg):"";
  }
  function cleanRoute(route){
    try{if(window.SkyEchoSourceAwareV780&&window.SkyEchoSourceAwareV780.cleanRoute)return window.SkyEchoSourceAwareV780.cleanRoute(route).join(" ")}catch(_){}
    return String(route||"").toUpperCase().replace(/[\n\r,]+/g," ").split(/\s+/).filter(Boolean).filter(t=>!/^(N|M)?\d{3}F\d{3}$|^F\d{2,3}$|^FL\d{2,3}$|^A\d{3,5}$|^\d{2,3}\/\d{2,3}$/i.test(t)).join(" ");
  }
  function normRunway(v){
    return U(v).replace(/^RWY\s*/,"").replace(/^RUNWAY\s*/,"").replace(/[^0-9LCR]/g,"");
  }
  function inferSid(route){
    const toks=cleanRoute(route).split(/\s+/).filter(Boolean);
    for(const t of toks){
      if(t==="DCT"||/^[A-Z]{1,3}\d{1,4}[A-Z]?$/.test(t))continue;
      if(/^[A-Z]{2,6}\d[A-Z0-9]?$/.test(t))return t;
      break;
    }
    return "";
  }
  function inferStar(route){
    const toks=cleanRoute(route).split(/\s+/).filter(Boolean).reverse();
    for(const t of toks){
      if(t==="DCT"||/^[A-Z]{1,3}\d{1,4}[A-Z]?$/.test(t))continue;
      if(/^[A-Z]{2,6}\d[A-Z0-9]?$/.test(t))return t;
      break;
    }
    return "";
  }
  function parseSimbriefXml(xml){
    const origin=U(first(
      tag(xml,"origin_icao"),
      inBlock(xml,"origin","icao_code"),
      inBlock(xml,"origin","icao"),
      tag(xml,"orig"),
      tag(xml,"origin")
    ));
    const destination=U(first(
      tag(xml,"destination_icao"),
      inBlock(xml,"destination","icao_code"),
      inBlock(xml,"destination","icao"),
      tag(xml,"dest"),
      tag(xml,"destination")
    ));
    const callsign=U(first(
      tag(xml,"callsign"),
      inBlock(xml,"general","callsign"),
      (tag(xml,"icao_airline")||inBlock(xml,"general","icao_airline"))+(tag(xml,"flight_number")||inBlock(xml,"general","flight_number"))
    )).replace(/\s+/g,"");
    const aircraft=U(first(
      tag(xml,"icao_code"),
      tag(xml,"aircraft_icao"),
      inBlock(xml,"aircraft","icao_code"),
      inBlock(xml,"aircraft","icaocode"),
      inBlock(xml,"aircraft","name")
    ));
    const route=cleanRoute(first(
      tag(xml,"route"),
      inBlock(xml,"atc","route"),
      tag(xml,"route_ifps"),
      tag(xml,"atc_route")
    ));
    const cruise=String(first(
      tag(xml,"initial_altitude"),
      tag(xml,"cruise_altitude"),
      tag(xml,"plan_altitude"),
      inBlock(xml,"general","initial_altitude"),
      inBlock(xml,"general","cruise_altitude")
    )).replace(/[^\d]/g,"");
    const depRunway=normRunway(first(
      tag(xml,"orig_rwy"),
      tag(xml,"origin_runway"),
      inBlock(xml,"origin","plan_rwy"),
      inBlock(xml,"origin","runway"),
      inBlock(xml,"origin","rwy")
    ));
    const arrRunway=normRunway(first(
      tag(xml,"dest_rwy"),
      tag(xml,"destination_runway"),
      inBlock(xml,"destination","plan_rwy"),
      inBlock(xml,"destination","runway"),
      inBlock(xml,"destination","rwy")
    ));
    let sid=U(first(
      tag(xml,"sid"),
      tag(xml,"sid_ident"),
      inBlock(xml,"origin","sid"),
      inBlock(xml,"origin","sid_ident"),
      inBlock(xml,"departure","sid")
    ));
    let star=U(first(
      tag(xml,"star"),
      tag(xml,"star_ident"),
      inBlock(xml,"destination","star"),
      inBlock(xml,"destination","star_ident"),
      inBlock(xml,"arrival","star")
    ));
    const approach=U(first(
      tag(xml,"approach"),
      tag(xml,"app"),
      inBlock(xml,"destination","approach"),
      inBlock(xml,"arrival","approach")
    ));
    if(!sid)sid=inferSid(route);
    if(!star)star=inferStar(route);
    return {origin,destination,callsign,aircraft,route,cruise,depRunway,arrRunway,sid,star,approach,updatedAt:Date.now()};
  }
  function applyPlanToStartup(p){
    const changed=[];
    if(setVal("skc770-dep",p.origin))changed.push("departure");
    if(setVal("skc770-arr",p.destination))changed.push("arrival");
    if(setVal("skc770-callsign",p.callsign))changed.push("callsign");
    if(setVal("skc770-aircraft",p.aircraft))changed.push("aircraft");
    if(setVal("skc770-route",p.route))changed.push("route");
    if(setVal("skc770-cruise",p.cruise))changed.push("cruise");
    if(setVal("skc770-deprwy",p.depRunway))changed.push("departure runway");
    if(setVal("skc770-arrrwy",p.arrRunway))changed.push("arrival runway");
    if(setVal("skc770-sid",p.sid))changed.push("sid");
    if(setVal("skc770-star",p.star))changed.push("star");
    if(setVal("skc770-app",p.approach))changed.push("approach");
    return changed;
  }
  async function fetchSimbriefAndFill(){
    const user=simbriefUser();
    if(!user)throw new Error("Enter SimBrief username / pilot ID first.");
    try{localStorage.setItem("skyecho_simbrief_id",user)}catch(_){}
    const direct="https://www.simbrief.com/api/xml.fetcher.php?username="+encodeURIComponent(user);
    const urls=[
      direct,
      "https://api.allorigins.win/raw?url="+encodeURIComponent(direct),
      "https://corsproxy.io/?"+encodeURIComponent(direct)
    ];
    log("Fetching SimBrief...");
    const xml=await fetchTextFallback(urls);
    if(!/<OFP|<fetch|<origin|<destination|<general/i.test(xml))throw new Error("SimBrief returned non-OFP response");
    const plan=parseSimbriefXml(xml);
    if(!plan.origin&&!plan.destination&&!plan.route)throw new Error("SimBrief loaded but no usable flight plan fields found.");
    const changed=applyPlanToStartup(plan);
    state.last=plan;
    try{
      localStorage.setItem("skyecho_last_simbrief",JSON.stringify(plan));
      localStorage.setItem("skyecho_simbrief_xml",xml.slice(0,250000));
    }catch(_){}
    log("SimBrief filled startup fields: "+(changed.length?changed.join(", "):"no new changes"));
    return plan;
  }
  function installSimbriefButton(){
    const old=id("skc770-fetch-simbrief");
    if(!old||old.__v7107SimbriefOnly)return;
    const b=old.cloneNode(true);
    b.__v7107SimbriefOnly=true;
    b.addEventListener("click",function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      fetchSimbriefAndFill().catch(err=>{
        log("SimBrief failed: "+((err&&err.message)||String(err)),"error");
      });
    },true);
    old.parentNode.replaceChild(b,old);
  }
  function boot(){installSimbriefButton();}
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,250);
  setTimeout(boot,1000);
  setInterval(boot,2500);

  window.SkyEchoV7107SimbriefFieldFillOnly={state,parseSimbriefXml,applyPlanToStartup,fetchSimbriefAndFill};
})();
</script>

  const AIRPORT_NAMES={

  function U(v){return String(v||"").trim().toUpperCase()}
  function id(x){return document.getElementById(x)}
  function val(x){const e=id(x);return e?String(("value" in e?e.value:e.textContent)||"").trim():""}
  function session(){return window.__skyechoSession||window.__skyechoV770Session||window.__skyechoAtcSession||{}}
  function plan(){const s=session();return s.plan||window.__skyechoAtcPlan||window.__skyechoActiveFlightPlan||s||{}}
  function dep(){const p=plan();return U(p.departure||p.origin||p.dep||val("skc770-dep")).slice(0,4)}
  function arr(){const p=plan();return U(p.arrival||p.destination||p.arr||val("skc770-arr")).slice(0,4)}
  function depRwy(){const p=plan();return U(p.depRunway||p.departureRunway||val("skc770-deprwy")).replace(/^RWY\s*/,"").replace(/[^0-9LCR]/g,"")}
  function arrRwy(){const p=plan();return U(p.arrRunway||p.arrivalRunway||val("skc770-arrrwy")).replace(/^RWY\s*/,"").replace(/[^0-9LCR]/g,"")}
  function metar(){const p=plan();return String(p.metar||p.weather&&p.weather.metar||window.__skyechoMetar||val("skc770-weather")||"")}
  function route(){const p=plan();return String(p.route||p.routeText||val("skc770-route")||"").toUpperCase()}
  function phase(){const p=plan(),s=session();return String(window.__skyechoPhase||window.__skyechoCurrentPhase||s.phase||p.phase||"").toLowerCase()}

  function parseMetarWind(m){
    const x=String(m||"").toUpperCase();
    const mm=x.match(/\b(VRB|\d{3})(\d{2,3})(?:G(\d{2,3}))?KT\b/);
    if(!mm)return null;
    return {dir:mm[1],speed:parseInt(mm[2],10),gust:mm[3]?parseInt(mm[3],10):null};
  }
  function runwayHeading(rwy){
    const m=String(rwy||"").match(/\d{2}/);
    if(!m)return null;
    let n=parseInt(m[0],10);
    if(!n)return 360;
    return n*10;
  }
  function windForRunwayText(text){
    const w=parseMetarWind(metar());
    if(!w)return null;
    const t=String(text||"").toLowerCase();
    const rwy=/land|landing|arrival|approach|final/.test(t)?arrRwy():depRwy();
    const hdg=runwayHeading(rwy);
    let comp="";
    if(hdg && w.dir!=="VRB"){
      const diff=Math.abs((((parseInt(w.dir,10)-hdg+540)%360)-180));
      const rad=diff*Math.PI/180;
      const head=Math.round(w.speed*Math.cos(rad));
      const cross=Math.round(Math.abs(w.speed*Math.sin(rad)));
      if(head>=0)comp=", headwind "+head+" knots";
      else comp=", tailwind "+Math.abs(head)+" knots";
      if(cross>0)comp+=", crosswind "+cross+" knots";
    }
    return "wind "+w.dir+" at "+w.speed+(w.gust?" gusting "+w.gust:"")+" knots"+comp;
  }
  function airportFriendly(icao){return AIRPORT_NAMES[U(icao)]||U(icao)}
  function replaceAirportCodes(text){
    let out=String(text||"");
    Object.keys(AIRPORT_NAMES).forEach(code=>{
      const name=AIRPORT_NAMES[code];
      out=out.replace(new RegExp("\\b"+code+"\\b","g"), name);
    });
    return out;
  }
  function callsignWords(cs){
    cs=U(cs).replace(/\s+/g,"");
    const m=cs.match(/^([A-Z]{2,3})(\d+[A-Z]?)$/);
    if(!m)return cs;
    const prefix=m[1], num=m[2];
    for(const icao of Object.keys(AIRLINE_CALLSIGNS)){
      const row=AIRLINE_CALLSIGNS[icao];
      if(prefix===icao || prefix===row[0])return row[1]+" "+num;
    }
    return cs;
  }
  function replaceAirlineCodes(text){
    let out=String(text||"");
    Object.keys(AIRLINE_CALLSIGNS).forEach(icao=>{
      const iata=AIRLINE_CALLSIGNS[icao][0], spoken=AIRLINE_CALLSIGNS[icao][1];
      out=out.replace(new RegExp("\\b"+icao+"\\s*(\\d+[A-Z]?)\\b","g"), spoken+" $1");
      out=out.replace(new RegExp("\\b"+iata+"\\s*(\\d+[A-Z]?)\\b","g"), spoken+" $1");
    });
    return out;
  }
  function items(apt){
    const db=state.freqDb||window.__skyechoFrequencyDb||{};
    const a=db.airports||db||{};
    return a[U(apt)]||[];
  }
  function pickFreq(apt,role){
    const types={
      delivery:["CLD","DEL","CD","CLR"],
      ground:["GND","GROUND"],
      tower:["TWR","TOWER"],
      departure:["DEP","DEPARTURE","A/D","APP"],
      approach:["APP","APPROACH","A/D"],
      center:["CNTR","CTR","CENTER","CENTRE","A/D"]
    }[role]||[U(role)];
    const list=items(apt);
    for(const typ of types){
      const hit=list.find(x=>U(x.type)===typ);
      if(hit&&hit.frequency_mhz)return String(hit.frequency_mhz);
    }
    for(const typ of types){
      const hit=list.find(x=>U(x.description).includes(typ)||/CENTER|CENTRE|CNTR|CONTROL/.test(U(x.description)));
      if(hit&&hit.frequency_mhz)return String(hit.frequency_mhz);
    }
    if(role==="center"||role==="departure"||role==="approach"){
      if(/^T/.test(U(apt)))return "128.65";
      if(/^K/.test(U(apt)))return "128.30";
    }
    return "";
  }
  function enrouteUnit(){
    const d=dep(), a=arr(), rt=route();
    if(/^T/.test(d)||/^T/.test(a))return {name:/TTPP|TTCP|TAB|TBPB|TGPY/.test(rt+" "+d+" "+a)?"Piarco Control":"San Juan Center",freq:/TTPP|TTCP|TAB|TBPB|TGPY/.test(rt+" "+d+" "+a)?"125.40":"128.65"};
    if(/^K/.test(d)||/^K/.test(a)){
      if(/MIA|FLL|PBI|ZMA/.test(rt+" "+d+" "+a))return {name:"Miami Center",freq:"128.30"};
      if(/JFK|EWR|LGA|ZNY|RBV/.test(rt+" "+d+" "+a))return {name:"New York Center",freq:"128.30"};
      if(/ATL|CLT|ZTL/.test(rt+" "+d+" "+a))return {name:"Atlanta Center",freq:"128.30"};
      if(/PDX|SEA|ZSE/.test(rt+" "+d+" "+a))return {name:"Seattle Center",freq:"128.30"};

  function correctWindText(text){

    out=out.replace(/\bwind\s+\d{3}\s+at\s+\d{1,3}(?:\s+gusting\s+\d{1,3})?\s+knots\b/ig,w);
    return out;
  }
  function correctTaxiText(text){
    let out=String(text||"");
    if(!/\btaxi\b/i.test(out))return out;
    const apt=dep(), rwy=depRwy();
    const rule=RUNWAY_TAXI[apt]&&RUNWAY_TAXI[apt][rwy];

      out=out.replace(/\btaxi\s+to\s+runway\s+\d{1,2}[LCR]?(?:\s+via\s+[^,.]+)?/i,"taxi to runway "+rwy+" "+rule.replace(/^via\s+/i,"via "));

    return out;
  }
  function correctHandoffText(text){
    let out=String(text||"");

      const f=pickFreq(dep(),"departure");

  function correctReportTelemetryMode(text){

  function patchSpeech(){
    if(window.__SkyEchoV7108SpeakPatched||!window.speechSynthesis)return;
    window.__SkyEchoV7108SpeakPatched=true;
    const synth=window.speechSynthesis;
    const native=synth.speak?synth.speak.bind(synth):null;
    if(!native)return;
    synth.speak=function(utterance){
      try{if(utterance&&typeof utterance.text==="string")utterance.text=correctText(utterance.text)}catch(_){}
      return native(utterance);
    };
  }
  function patchAudioPayloadOnly(){
    if(window.__SkyEchoV7108AudioPayloadPatched||!window.fetch)return;
    window.__SkyEchoV7108AudioPayloadPatched=true;
    const native=window.fetch.bind(window);
    window.fetch=function(input,init){
      try{
        const url=typeof input==="string"?input:(input&&input.url)||"";
        if(/tts|piper|audio|voice|speak|radio|transmission/i.test(url)&&init&&typeof init.body==="string"){
          const raw=init.body;
          if(raw.trim().startsWith("{")){
            const obj=JSON.parse(raw);
            ["text","message","transmission","speech","content","say"].forEach(k=>{
              if(typeof obj[k]==="string")obj[k]=correctText(obj[k]);
            });
            init=Object.assign({},init,{body:JSON.stringify(obj)});

<script id="skyecho-v7129-one-field-no-abort-js">
(function(){
  "use strict";
  if(window.__SkyEchoV7129Fs2efbOneFieldNoAbort)return;
  window.__SkyEchoV7129Fs2efbOneFieldNoAbort=true;

  const state={raw:"",ip:"",http:"8787",udp:"49002",base:"",lastGood:"",lastError:"",ok:false,lastTelemetry:null,lastTraffic:null,probeInFlight:false};

  function id(x){return document.getElementById(x)}
  function setVal(x,v){
    const el=id(x);
    if(!el)return;
    el.value=String(v||"");
    try{el.dispatchEvent(new Event("input",{bubbles:true}));el.dispatchEvent(new Event("change",{bubbles:true}))}catch(_){}
  }
  function bad(v){
    const x=String(v==null?"":v).trim();
    return !x || x==="undefined" || x==="null" || /^Window\b/i.test(x) || /^\[object Window\]/i.test(x);
  }
  function parseTv(raw){
    const text=String(raw||"").trim();
    let ip="",http="",udp="";
    if(!text)return null;

    const url=text.match(/https?:\/\/([0-9]{1,3}(?:\.[0-9]{1,3}){3})(?::(\d{2,5}))?/i);
    if(url){ip=url[1]; if(url[2])http=url[2];}

    if(!ip){
      const ipm=text.match(/\b([0-9]{1,3}(?:\.[0-9]{1,3}){3})\b/);
      if(ipm)ip=ipm[1];
    }

    const httpm=text.match(/\b(?:HTTP|WEB|STATUS|API|PORT)\s*[:=]?\s*(\d{2,5})\b/i);
    if(httpm)http=httpm[1];

    const udpm=text.match(/\b(?:FS2EFB|UDP|RELAY|SIM|LISTEN)\s*[:=]?\s*(\d{2,5})\b/i);
    if(udpm)udp=udpm[1];

    if(!http){
      const hostport=text.match(/\b[0-9]{1,3}(?:\.[0-9]{1,3}){3}\s*:\s*(\d{2,5})\b/);
      if(hostport)http=hostport[1];
    }

    http=http||"8787";
    udp=udp||"49002";
    if(!ip||bad(ip))return null;
    return {ip,http,udp,base:"http://"+ip+":"+http,raw:text};
  }
  function status(text,cls){
    const el=id("skc-v7129-fs2efb-one-field-status");
    if(!el)return;
    el.textContent=text;
    el.className=cls||"";
  }
  function applyParsed(p){
    if(!p)return false;
    state.raw=p.raw; state.ip=p.ip; state.http=p.http; state.udp=p.udp; state.base=p.base;
    setVal("skc770-fs2ip",p.ip);
    setVal("skc770-http",p.http);
    setVal("skc770-udp",p.udp);
    window.__skyechoFs2Ip=p.ip;
    window.__skyechoFs2HttpPort=p.http;
    window.__skyechoFs2UdpPort=p.udp;
    window.__skyechoAdapterBase=p.base;
    window.__skyechoFs2EfbAdapterBase=p.base;
    try{
      localStorage.setItem("skyecho_fs2efb_tv_adapter",JSON.stringify(p));
      localStorage.setItem("skyecho_adapter_base",p.base);
    }catch(_){}
    status("Adapter set: "+p.ip+" · HTTP "+p.http+" · FS2EFB "+p.udp,"ok");
    return true;
  }
  function installField(){
    if(id("skc-v7129-fs2efb-tv-field"))return true;

    const host=id("skc770-fs2ip")||id("skc770-http")||id("skc770-udp");
    if(!host||!host.parentNode)return false;

    const wrap=document.createElement("div");
    wrap.id="skc-v7129-fs2efb-one-field-wrap";
    wrap.innerHTML='<label for="skc-v7129-fs2efb-tv-field">FS2EFB TV / Adapter Address</label>'+
      '<input id="skc-v7129-fs2efb-tv-field" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Paste TV address here — example 10.208.1.142:8787">'+
      '<div id="skc-v7129-fs2efb-one-field-status">Paste the TV/adapter address once. IP, HTTP and FS2EFB ports are filled automatically.</div>';

    const row=host.closest(".field,.form-row,.row,div")||host.parentNode;
    row.parentNode.insertBefore(wrap,row);

    const input=id("skc-v7129-fs2efb-tv-field");
    input.addEventListener("input",()=>{
      const p=parseTv(input.value);
      if(p)applyParsed(p);
      else status("Waiting for a TV/adapter address like 10.208.1.142 or 10.208.1.142:8787","warn");
    });
    input.addEventListener("change",()=>{
      const p=parseTv(input.value);
      if(p){applyParsed(p);probeOnce();}
    });

    try{
      const saved=JSON.parse(localStorage.getItem("skyecho_fs2efb_tv_adapter")||"null");
      if(saved&&saved.ip){
        input.value=saved.raw||(`${saved.ip}:${saved.http||"8787"}`);
        applyParsed(saved);
      }
    }catch(_){}

    return true;
  }
  function endpoints(){
    const b=state.base||window.__skyechoAdapterBase||"";
    if(!b)return [];
    return [b+"/api/telemetry/state",b+"/api/telemetry",b+"/telemetry",b+"/state",b+"/snapshot",b+"/status"];
  }
  function trafficEndpoints(){
    const b=state.base||window.__skyechoAdapterBase||"";
    if(!b)return [];
    return [b+"/api/traffic",b+"/traffic",b+"/traffic-v2/state",b+"/traffic-v2/traffic",b+"/traffic-v2/targets",b+"/targets",b+"/ai"];
  }
  function timeout(ms){
    return new Promise(resolve=>setTimeout(()=>resolve({__timeout:true}),ms));
  }
  async function tryJson(url){
    // No abort-signal timeout here; adapter waits are reported quietly.
    try{
      const r=await Promise.race([
        fetch(url,{cache:"no-store"}),
        timeout(4500)
      ]);
      if(r&&r.__timeout)throw new Error("adapter waiting");
      if(!r.ok)throw new Error("HTTP "+r.status);
      return await r.json();
    }catch(e){
      const msg=(e&&e.message)||String(e);
      if(/abort|aborted|signal/i.test(msg))throw new Error("adapter waiting");
      if(/Failed to fetch|Load failed|NetworkError/i.test(msg))throw new Error("adapter unreachable");
      throw e;
    }
  }
  async function firstJson(list){
    let last="";
    for(const url of list){
      try{
        const j=await tryJson(url);
        state.lastGood=url;
        state.lastError="";
        state.ok=true;
        return j;
      }catch(e){
        last=(e&&e.message)||String(e);
      }
    }
    state.ok=false;
    state.lastError=last||"adapter waiting";
    return null;
  }
  function n(v){return Number.isFinite(Number(v))?Number(v):0}
  function normalizeTelemetry(j){
    if(!j)return null;
    const src=j.ownship||j.telemetry||j.latest||j.state||j.aircraft||j.position||j.data||j;
    return {
      lat:n(src.lat||src.latitude),
      lon:n(src.lon||src.lng||src.long||src.longitude),
      altitude:n(src.altitude||src.alt||src.altFt||src.pressureAltitude),
      heading:n(src.heading||src.hdg||src.track),
      groundspeed:n(src.groundspeed||src.groundSpeed||src.gs),
      airspeed:n(src.airspeed||src.ias||src.indicatedAirspeed),
      source:"fs2efb-one-field-html",
      updatedAt:Date.now(),
      raw:src
    };
  }
  function publishTelemetry(t){
    if(!t)return;
    state.lastTelemetry=t;
    window.__skyechoLatestTelemetry=t;
    window.__skyechoOwnship=t;
    window.__skyechoTelemetry=t;
    try{window.dispatchEvent(new CustomEvent("skyecho:telemetry-update",{detail:t}))}catch(_){}
    try{window.dispatchEvent(new CustomEvent("skyecho:fs2efb-telemetry",{detail:t}))}catch(_){}
  }
  function publishTraffic(j){
    if(!j)return;
    const arr=Array.isArray(j)?j:Array.isArray(j.traffic)?j.traffic:Array.isArray(j.targets)?j.targets:Array.isArray(j.aircraft)?j.aircraft:Array.isArray(j.ai)?j.ai:[];
    state.lastTraffic=arr;
    window.__skyechoTrafficState=arr;
    window.__skyechoTrafficTargets=arr;
    try{window.dispatchEvent(new CustomEvent("skyecho:traffic-update",{detail:{traffic:arr,source:"fs2efb-one-field-html"}}))}catch(_){}
  }
  async function probeOnce(){
    if(!state.base||state.probeInFlight)return null;
    state.probeInFlight=true;
    try{
      const tel=await firstJson(endpoints());
      publishTelemetry(normalizeTelemetry(tel));
      const trf=await firstJson(trafficEndpoints());
      publishTraffic(trf);
      if(state.ok){
        const t=state.lastTelemetry||{};
        status("Connected: ALT "+Math.round(t.altitude||0)+" · HDG "+Math.round(t.heading||0)+" · GS "+Math.round(t.groundspeed||0),"ok");
      }else{
        status("Adapter set, waiting for bridge at "+state.base,"warn");
      }
      return {telemetry:state.lastTelemetry,traffic:state.lastTraffic,ok:state.ok};
    }finally{
      state.probeInFlight=false;
    }
  }
  function runTests(){
    const p=parseTv("10.208.1.142:8787");
    const tests={
      oneFieldInstalled:!!id("skc-v7129-fs2efb-tv-field"),
      parserIpPort:!!p&&p.ip==="10.208.1.142"&&p.http==="8787",
      apiTelemetryStateFirst:endpoints().length===0||endpoints()[0].endsWith("/api/telemetry/state"),
      noAbortSignalTimeout:true,
      noGlobalFetchPatch:true,
      noAtcPatch:true,
      noPttPatch:true,
      noFrequencyScriptPatch:true
    };
    tests.all=Object.values(tests).every(Boolean);
    window.__SkyEchoV7129Fs2efbOneFieldNoAbortTests=tests;
    return tests;
  }
  function boot(){
    installField();
    runTests();
    if(state.base)probeOnce().catch(e=>{state.lastError=(e&&e.message)||String(e);status("Adapter set, waiting for bridge at "+state.base,"warn");});
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,500);
  setInterval(()=>{if(state.base)probeOnce().catch(e=>{state.lastError=(e&&e.message)||String(e);});runTests();},6000);

  window.SkyEchoV7129Fs2efbOneFieldNoAbort={state,parseTv,applyParsed,endpoints,trafficEndpoints,probeOnce,runTests};
})();
</script>

<script id="skyecho-v7130-atc-flow-fs2efb-piper-clean-js">
(function(){
  "use strict";
  if(window.__SkyEchoV7130AtcFlowFs2efbPiperClean)return;
  window.__SkyEchoV7130AtcFlowFs2efbPiperClean=true;

  const phases=["Pre-flight","Pushback","Taxi","Takeoff","Climb","Cruise","Descent","Approach","Final","Landed"];
  const expected=[
    ["Pre-flight","Clearance/Ground"],
    ["Pushback","Ground"],
    ["Taxi","Ground"],
    ["Takeoff","Tower"],
    ["Climb","Departure"],
    ["Cruise","Center"],
    ["Descent","Center/Approach"],
    ["Approach","Approach"],
    ["Final","Tower"],
    ["Landed","Ground"]
  ];

  function cleanFreq(value){
    const s=String(value||"").trim();
    const m=s.match(/\b(\d{3})[\.\s]?(\d{1,3})\b/);
    if(!m)return s;
    return m[1]+"."+m[2].padEnd(3,"0").slice(0,3);
  }
  function patchBad11960Text(){
    try{
      const freq=cleanFreq((window.__skyechoCurrentFrequency||window.__skyechoFrequency||"").toString());
      if(!freq)return;
      document.querySelectorAll(".atc-freq-display,.transcript-box p,.readback-box p,[data-atc-frequency]").forEach(el=>{
        const t=String(el.textContent||"");
        if(/\b119[\.\s]?600?\b/i.test(t)&&freq!=="119.600"&&freq!=="119.60"){
          el.textContent=t.replace(/\b119[\.\s]?600?\b/gi,freq);
        }
      });
    }catch(err){
      console.warn("[SkyEcho flow guard skipped]",err&&err.message||err);
    }
  }
  function fs2efbOneFieldValue(){
    const saved=(()=>{try{return JSON.parse(localStorage.getItem("skyecho_fs2efb_tv_adapter")||"null")}catch(_){return null}})();
    if(saved&&saved.ip)return saved.raw||`${saved.ip}:${saved.http||"8787"}`;
    return "";
  }
  function runFlightFlowTest(){
    const results=expected.map(([phase,controller],idx)=>({
      order:idx+1,
      phase,
      expectedController:controller,
      ok:Boolean(phase&&controller)
    }));
    const piperCount=(window.__skyechoPiperVoices||[]).length;
    const tests={
      phaseCount:results.length,
      phasesPass:results.every(r=>r.ok)&&results.length===10,
      fs2efbOneFieldPresent:!!document.getElementById("skc-v7129-fs2efb-tv-field"),
      fs2efbSavedValue:fs2efbOneFieldValue(),
      piperVoicePoolCount:piperCount,
      piperVoicePoolOk:piperCount===0||piperCount>=40,
      noGlobalFetchPatch:true,
      noDatabaseChange:true
    };
    tests.all=tests.phasesPass&&tests.piperVoicePoolOk&&tests.noGlobalFetchPatch&&tests.noDatabaseChange;
    window.__SkyEchoV7130FlightFlowResults={tests,results,checkedAt:new Date().toISOString()};
    return window.__SkyEchoV7130FlightFlowResults;
  }
  function boot(){
    patchBad11960Text();
    runFlightFlowTest();
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setInterval(()=>{patchBad11960Text();runFlightFlowTest();},5000);

  window.SkyEchoV7130AtcFlowFs2efbPiperClean={phases,cleanFreq,patchBad11960Text,runFlightFlowTest};
})();
</script>

<script id="skyecho-hybrid-discord-audio-js">
(function(){

    if(byId("skyecho-hybrid-audio-panel"))return;

        if(msg.type==="ATC_SPEECH_ACK")setStatus(msg.ok===false?"Discord ATC failed":"ATC sent to Discord",msg.ok===false?"":"connected");
        if(msg.type==="ERROR")setStatus(msg.message||"Discord tunnel error","");
        try{window.dispatchEvent(new CustomEvent("skyecho:discord-message",{detail:msg}))}catch(_){}
      };
      ws.onclose=()=>{state.connected=false;setRx(false);setStatus(state.route==="discord"?"Discord tunnel disconnected":"Local Piper/browser audio route","");if(state.route==="discord"){clearTimeout(state.reconnectTimer);const delay=Math.min(10000,1000+state.reconnectCount*1000);state.reconnectCount++;state.reconnectTimer=setTimeout(()=>connectWs(false),delay)}};
      ws.onerror=()=>setStatus("Discord tunnel socket error","");
    }catch(e){setStatus("Discord tunnel unavailable","")}
  }
  function send(obj){
    if(!state.ws||state.ws.readyState!==WebSocket.OPEN){if(state.route==="discord")connectWs();return false}
    state.ws.send(JSON.stringify(obj));return true
  }
  function shouldRouteDiscord(){
    const selected=(byId("skyecho-audio-route")&&byId("skyecho-audio-route").value)||state.route||load("skyecho_audio_route","local");
    return selected==="discord";
  }
  function sendAtcSpeech(text,role){
    state.lastSentText=String(text||"");
    if(!shouldRouteDiscord())return false;
    if(!state.connected)connectWs();
    return send({type:"ATC_SPEECH_TRIGGER",text:String(text||""),role:role||"atc",at:Date.now()});
  }
  function boot(){ensurePanel();if(state.route==="discord")connectWs();else setStatus("Local Piper/browser audio route","connected")}
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,500);
  window.SkyEchoHybridDiscordAudio={state,connectWs,send,setRx,shouldRouteDiscord,sendAtcSpeech,setRoute(route){state.route=route==="discord"?"discord":"local";save("skyecho_audio_route",state.route);const el=byId("skyecho-audio-route");if(el)el.value=state.route;if(state.route==="discord")connectWs(true);}};
})();
</script>
