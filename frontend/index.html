      }catch(e){log('ERROR','ADS-B failed: '+(e.message||e))}
    }
    async function start(){
      try{
        const payload=form();
        log('START REQUEST',JSON.stringify(payload));
        const j=await api('/traffic-v2/start',payload);
        renderState(j,'START RESPONSE');
        // v6.9.43: arm real Traffic v2 Piper playback. No temporary auto-release here,
        // because auto-release can skip audible AI transmissions before the browser plays them.
        try{ armTrafficV2PiperPlayback(); }catch(e){ log('AUDIO ERROR','Traffic v2 Piper arm failed: '+(e&&e.message||e)); }
      }catch(e){log('ERROR','Traffic v2 start failed: '+(e.message||e))}
    }
    
    function hardStopTrafficV2Audio(){
      try{window.__skyechoTrafficV2Stopped=true;}catch(_){}
      try{window.__skyechoTrafficV2PiperArmed=false;}catch(_){}
      try{window.__skyechoTrafficV2PiperQueue=[];}catch(_){}
      try{window.__skyechoTrafficV2PiperPlaying=false;}catch(_){}
      try{if(window.__skyechoTrafficV2AutoRelease){clearInterval(window.__skyechoTrafficV2AutoRelease);window.__skyechoTrafficV2AutoRelease=null}}catch(_){}
      try{if(window.__skyechoTrafficV2AudioWs){window.__skyechoTrafficV2AudioWs.onmessage=null;window.__skyechoTrafficV2AudioWs.onopen=null;window.__skyechoTrafficV2AudioWs.onclose=null;window.__skyechoTrafficV2AudioWs.onerror=null;window.__skyechoTrafficV2AudioWs.close();window.__skyechoTrafficV2AudioWs=null}}catch(_){}
      try{if(window.speechSynthesis) window.speechSynthesis.cancel();}catch(_){}
      try{if(window.__skyechoTrafficV2AudioCtx && window.__skyechoTrafficV2AudioCtx.state==='running') window.__skyechoTrafficV2AudioCtx.suspend().catch(()=>{});}catch(_){}
      try{window.__skyechoTrafficState=[];window.__skyechoTrafficQueue=[];window.__skyechoTrafficDensity=0;}catch(_){}
      try{localStorage.setItem('skyecho_ai_traffic_enabled','false');localStorage.setItem('skyecho_traffic_density','0');localStorage.setItem('skyecho_traffic_v2_stopped','1');}catch(_){}
    }

    async function stop(){
      try{
        hardStopTrafficV2Audio();
        const j=await api('/traffic-v2/stop',{source:'floating_ui_traffic_v2_only'});
        log('STOP',JSON.stringify(j).slice(0,900));
        setTimeout(state,500);
      }catch(e){log('ERROR','Traffic v2 stop failed: '+(e.message||e))}
    }

    window.__skyechoTrafficV2Start=start;
    window.__skyechoTrafficV2State=state;
    window.__skyechoTrafficV2Stop=stop;
    window.__skyechoHardStopTrafficV2=hardStopTrafficV2Audio;

    qs('tr_rescue_min').onclick=function(){p.classList.toggle('min');this.textContent=p.classList.contains('min')?'+':'–'};
    qs('tr_rescue_prepare').onclick=health;
    qs('tr_rescue_start').onclick=start;
    qs('tr_rescue_state').onclick=state;
    qs('tr_rescue_adsb').onclick=adsb;
    qs('tr_rescue_stop').onclick=stop;
    makeDrag(p,qs('tr_rescue_drag'));
    health();
    setTimeout(state,800);
  }

  function boot(){
    hideOldTrafficUis();
    buildPanel();
    setInterval(hideOldTrafficUis,2500);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
})();
</script>


<!-- SkyEcho UltraStrict additive patch embedded standalone v6.9.51 -->
<script>
/* SkyEchoCabin UltraStrict Guard v6.9.48
   Safe additive patch: phase buttons + external traffic receive/control bridge.
   Does NOT replace the core app. It adds visible manual phase control, parser guards,
   FS2EFB/SayIntentions polling, and TTS playback for externally received traffic. */
(function(){
  'use strict';
  if (window.__SKYECHO_ULTRASTRICT_6948__) return;
  window.__SKYECHO_ULTRASTRICT_6948__ = true;

  const CFG_KEY='skyecho_ultrastrict_config_v6948';
  const OLD_CFG_KEY='skyecho_ultrastrict_config_v6947';
  const PHASE_KEY='skyecho_manual_phase_v6948';
  const TRAFFIC_SPOKEN_KEY='skyecho_si_spoken_ids_v6948';
  const PHASES=['clearance','ground','tower','departure','enroute','approach','landed'];
  const PHASE_LABELS={clearance:'Clearance',ground:'Ground / Push & Taxi',tower:'Tower / Takeoff',departure:'Departure',enroute:'Enroute',approach:'Approach',landed:'Landed / Taxi In'};

  const DEFAULT_CFG={
    fs2efb:{enabled:false,url:'',pollMs:1000},
    sayIntentions:{enabled:false,url:'',apiKey:'',pollMs:2500,audio:true},
    syntheticTraffic:false,
    strictPhaseLock:true,
    preventRadarContactLoop:true,
    externalTrafficAudio:true
  };

  const safeJson=(v,fallback)=>{try{return JSON.parse(v)||fallback}catch{return fallback}};
  function deepMerge(a,b){
    const out=Array.isArray(a)?[...a]:{...a};
    for(const k of Object.keys(b||{})){
      if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])) out[k]=deepMerge(out[k]||{},b[k]);
      else out[k]=b[k];
    }
    return out;
  }
  function loadCfg(){
    const old=safeJson(localStorage.getItem(OLD_CFG_KEY),{});
    const cur=safeJson(localStorage.getItem(CFG_KEY),{});
    return deepMerge(deepMerge(DEFAULT_CFG,old),cur);
  }
  function saveCfg(partial){const cfg=deepMerge(loadCfg(),partial); localStorage.setItem(CFG_KEY,JSON.stringify(cfg)); return cfg;}
  let cfg=loadCfg();

  function addLog(type,meta,msg){
    try{
      window.dispatchEvent(new CustomEvent('skyecho:external-log',{detail:{type,meta,msg,time:Date.now()}}));
      const key='skyecho_external_logs_v6947';
      const arr=safeJson(localStorage.getItem(key),'[]');
      arr.unshift({type,meta,msg,time:new Date().toISOString()});
      localStorage.setItem(key,JSON.stringify(arr.slice(0,80)));
    }catch{}
    try{console.log(`[SkyEcho UltraStrict ${type}] ${meta}: ${msg}`)}catch{}
  }

  // Disable old/generated AI traffic without deleting user code.
  function disableSyntheticTraffic(){
    try{
      window.__skyechoTrafficDensity=0;
      window.__skyechoTrafficQueue=[];
      window.__skyechoStrictNoBrowserTraffic=true;
      localStorage.setItem('skyecho_traffic_density','0');
      localStorage.setItem('skyecho_ai_traffic_enabled','false');
      localStorage.setItem('skyecho_synthetic_traffic_enabled','false');
    }catch{}
  }
  disableSyntheticTraffic(); setInterval(disableSyntheticTraffic,5000);

  // Parser guard helpers.
  const AIRWAY_RE=/\b(?:A|B|G|L|M|N|P|Q|R|T|U|UL|UM|UN|UP|UR|UT|V|W|Y|Z)\s*-?\s*(\d{1,4}[A-Z]?)\b/i; // G633, A555, Q42, UL620, UM525
  const RUNWAY_RE=/\b(?:runway|rwy)\s*(\d{1,2}[lrc]?)\b/i;
  const APPROACH_TYPE_RE=/\b(ils|rnav|vor|ndb|visual|localizer|loc|final|glideslope|glidepath|approach course)\b/i;
  const CHECKIN_RE=/\b(with you|checking in|check in|passing|climbing through|descending through|level)\b/i;
  const READBACK_ACTION_RE=/\b(cleared|clearance|taxi|hold short|line up|takeoff|land|climb|descend|maintain|turn|heading|direct|proceed|squawk|contact|frequency|expect|altimeter|push|start)\b/i;
  const ROUTE_REPORT_RE=/\b(report|passing|abeam|over|crossing|established on|joining|intercepting|tracking|level)\b/i;
  const ESTABLISHED_ON_AIRWAY_RE=/\bestablished\s+on\s+(?:airway\s+)?(?:A|B|G|L|M|N|P|Q|R|T|U|UL|UM|UN|UP|UR|UT|V|W|Y|Z)\s*-?\s*\d{1,4}[A-Z]?\b/i;
  const ESTABLISHED_APPROACH_RE=/\bestablished\s+(?:on\s+)?(?:the\s+)?(?:(?:ils|rnav|vor|ndb|visual|localizer|loc)\s+(?:approach\s+)?(?:runway|rwy)?\s*\d{0,2}[lrc]?|final(?:\s+approach)?|localizer|glideslope|glidepath)\b/i;

  function normalizeTranscript(raw){
    let l=String(raw||'').trim().toLowerCase();
    const repl=[
      [/alpha\s+november\s+uniform/g,'anu'],[/golf\s+six\s+three\s+three/g,'g633'],[/golf\s+633/g,'g633'],
      [/flight\s+level\s+one\s+zero\s+zero/g,'fl100'],[/flight\s+level\s+three\s+four\s+zero/g,'fl340'],[/flight\s+level\s+one\s+six\s+zero/g,'fl160'],
      [/two\s+niner\s+niner\s+niner/g,'2999'],[/zero\s+seven/g,'07'],[/zero\s+niner/g,'09'],[/zero\s+four\s+zero/g,'040']
    ];
    for(const [a,b] of repl) l=l.replace(a,b);
    return l.replace(/\s+/g,' ').trim();
  }
  function classify(raw,state={}){
    const text=normalizeTranscript(raw);
    const hasReadback=READBACK_ACTION_RE.test(text);
    const airwayMatch=text.match(AIRWAY_RE);
    const airway=airwayMatch ? airwayMatch[0].toUpperCase().replace(/\s|-/g,'') : '';
    const hasRunway=RUNWAY_RE.test(text);
    const hasApproachType=APPROACH_TYPE_RE.test(text);
    const isEstablishedOnAirway=ESTABLISHED_ON_AIRWAY_RE.test(text) || (/\bestablished\s+on\b/i.test(text) && !!airway);
    const isRouteReport=(ROUTE_REPORT_RE.test(text)||isEstablishedOnAirway) && (!!airway||/\banu\b/i.test(text));
    const isApproachEstablished=ESTABLISHED_APPROACH_RE.test(text) || ((hasApproachType||hasRunway) && /\bestablished|final|localizer|glideslope|glidepath\b/i.test(text));
    const isApproach=isApproachEstablished && !isEstablishedOnAirway;
    const isCheckin=CHECKIN_RE.test(text) && !hasReadback && !isRouteReport;
    let intent='unknown';
    // ULTRA STRICT PRIORITY: airway route reports always beat approach-established logic.
    if(isRouteReport) intent='route_position_report';
    else if(isApproach) intent='approach_established';
    else if(isCheckin) intent='controller_checkin';
    else if(hasReadback) intent='instruction_readback';
    else if(/clearance|ifr/.test(text)) intent='request_clearance';
    return {raw,text,intent,isCheckin,isRouteReport,isApproach,isEstablishedOnAirway,isApproachEstablished,airway,hasRunway,hasApproachType,hasReadback,phase:getPhase(),controller:state.controller||'',time:Date.now()};
  }
  function shouldBlockRadarLoop(raw,state={}){
    const r=classify(raw,state);
    if(!loadCfg().preventRadarContactLoop) return {block:false,reason:'disabled',parsed:r};
    if(r.intent==='controller_checkin') return {block:true,reason:'checkin_not_readback',parsed:r};
    if(r.intent==='route_position_report') return {block:true,reason:'route_report_not_departure_reset',parsed:r};
    if(r.intent==='approach_established') return {block:true,reason:'approach_established_not_airway',parsed:r};
    return {block:false,reason:'ok',parsed:r};
  }


  window.SkyEchoUltraStrictParser={
    classify,
    shouldBlockRadarLoop,
    normalizeTranscript,
    setPhase,
    getPhase,
    test:function(phrase){const r=classify(phrase); addLog('system','PARSER TEST', phrase+' => '+r.intent+(r.airway?' / airway '+r.airway:'')); return r;}
  };

  function getPhase(){
    const v=localStorage.getItem(PHASE_KEY)||localStorage.getItem('skyecho_current_phase')||'clearance';
    return PHASES.includes(v)?v:'clearance';
  }
  function setPhase(phase,reason='manual'){
    if(!PHASES.includes(phase)) return getPhase();
    localStorage.setItem(PHASE_KEY,phase);
    localStorage.setItem('skyecho_current_phase',phase);
    window.__skyechoCurrentPhase=phase;
    window.dispatchEvent(new CustomEvent('skyecho:phase-change',{detail:{phase,reason,time:Date.now()}}));
    addLog('system','PHASE '+reason.toUpperCase(),PHASE_LABELS[phase]);
    updatePhasePanel();
    return phase;
  }
  function stepPhase(delta){
    const i=Math.max(0,PHASES.indexOf(getPhase()));
    const ni=Math.max(0,Math.min(PHASES.length-1,i+delta));
    return setPhase(PHASES[ni],delta>0?'forward':'backward');
  }

  // Connector polling.
  async function pollFs2efb(){
    cfg=loadCfg(); if(!cfg.fs2efb.enabled||!cfg.fs2efb.url) return;
    try{
      const res=await fetch(cfg.fs2efb.url,{cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status);
      const d=await res.json();
      window.__skyechoTelemetryState=Object.assign({}, window.__skyechoTelemetryState||{}, d, {source:'FS2EFB',lastUpdate:Date.now()});
      panelStatus('FS2EFB live');
    }catch(e){panelStatus('FS2EFB offline: '+e.message)}
  }

  function normalizeTrafficPayload(d){
    const list=Array.isArray(d)?d:(d?.traffic||d?.aircraft||d?.targets||d?.nearbyAircraft||d?.data||[]);
    if(!Array.isArray(list)) return [];
    return list.map((x,i)=>{
      const callsign=x.callsign||x.ident||x.flight||x.name||x.tailNumber||x.tail||`TRAFFIC ${i+1}`;
      const phrase=x.lastTransmission||x.transmission||x.intentPhrase||x.phrase||x.message||x.radio||'';
      return Object.assign({},x,{id:x.id||x.uuid||x.aircraftId||callsign,callsign,phrase,source:'SayIntentions',lastUpdate:Date.now()});
    });
  }
  const spoken=safeJson(localStorage.getItem(TRAFFIC_SPOKEN_KEY),'[]');
  const spokenSet=new Set(Array.isArray(spoken)?spoken:[]);
  function rememberSpoken(id){
    if(!id) return; spokenSet.add(id); const arr=[...spokenSet].slice(-200); localStorage.setItem(TRAFFIC_SPOKEN_KEY,JSON.stringify(arr));
  }
  function speakTraffic(item){
    cfg=loadCfg(); if(!cfg.externalTrafficAudio||!cfg.sayIntentions.audio) return;
    const phrase=item.phrase||item.intentPhrase||item.message||'';
    if(!phrase) return;
    const key=String(item.id)+'|'+phrase;
    if(spokenSet.has(key)) return;
    rememberSpoken(key);
    addLog('traffic',item.callsign||'TRAFFIC',phrase);
    if('speechSynthesis' in window){
      const u=new SpeechSynthesisUtterance(phrase);
      u.rate=1.02; u.pitch=.92;
      try{window.speechSynthesis.speak(u)}catch{}
    }
  }
  function injectTrafficIntoEngine(list){
    window.__skyechoExternalTrafficState=list;
    window.__skyechoTrafficState=list;
    window.__skyechoManagedTraffic=list;
    window.dispatchEvent(new CustomEvent('skyecho:traffic-update',{detail:{source:'SayIntentions',traffic:list,time:Date.now()}}));
    // Allow existing app modules to consume this without rewriting them.
    try{localStorage.setItem('skyecho_external_traffic_cache',JSON.stringify({source:'SayIntentions',time:Date.now(),traffic:list.slice(0,50)}));}catch{}
    list.slice(0,3).forEach(speakTraffic);
  }
  async function pollSayIntentions(){
    cfg=loadCfg(); if(!cfg.sayIntentions.enabled||!cfg.sayIntentions.url) return;
    try{
      const headers={}; if(cfg.sayIntentions.apiKey) headers.Authorization='Bearer '+cfg.sayIntentions.apiKey;
      const res=await fetch(cfg.sayIntentions.url,{headers,cache:'no-store'}); if(!res.ok) throw new Error('HTTP '+res.status);
      const d=await res.json();
      const list=normalizeTrafficPayload(d);
      injectTrafficIntoEngine(list);
      panelStatus('SayIntentions traffic live: '+list.length);
    }catch(e){panelStatus('SayIntentions offline: '+e.message)}
  }

  let fsTimer=null,siTimer=null;
  function restartPolling(){
    if(fsTimer) clearInterval(fsTimer); if(siTimer) clearInterval(siTimer);
    cfg=loadCfg();
    fsTimer=setInterval(pollFs2efb, Math.max(500, cfg.fs2efb.pollMs||1000));
    siTimer=setInterval(pollSayIntentions, Math.max(1500, cfg.sayIntentions.pollMs||2500));
    pollFs2efb(); pollSayIntentions();
  }

  function panelStatus(msg){const el=document.getElementById('skyecho-us-status'); if(el) el.textContent=msg;}
  function updatePhasePanel(){
    const el=document.getElementById('us-phase-label'); if(el) el.textContent=PHASE_LABELS[getPhase()]||getPhase();
    const sel=document.getElementById('us-phase-select'); if(sel) sel.value=getPhase();
  }
  function buildPanel(){
    if(document.getElementById('skyecho-ultrastrict-panel')) return;
    const box=document.createElement('div'); box.id='skyecho-ultrastrict-panel';
    box.style.cssText='position:fixed;right:14px;bottom:14px;z-index:999999;width:min(455px,calc(100vw - 28px));background:rgba(2,6,23,.96);color:#f8fafc;border:1px solid rgba(103,232,249,.35);border-radius:18px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,.45);font:13px system-ui';
    box.innerHTML=`<b style="color:#67e8f9">SkyEcho UltraStrict Guard v6.9.48</b>
      <div id="skyecho-us-status" style="margin:6px 0;color:#cbd5e1">Parser guard active. External traffic bridge ready.</div>
      <div style="display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap">
        <button id="us-prev" style="background:#1e293b;color:#fff;border:1px solid #334155;border-radius:10px;padding:8px 10px;font-weight:800">‹ Previous Phase</button>
        <button id="us-next" style="background:#1e293b;color:#fff;border:1px solid #334155;border-radius:10px;padding:8px 10px;font-weight:800">Next Phase ›</button>
        <select id="us-phase-select" style="flex:1;min-width:150px;background:#0f172a;color:white;border:1px solid #334155;border-radius:8px;padding:8px">${PHASES.map(p=>`<option value="${p}">${PHASE_LABELS[p]}</option>`).join('')}</select>
      </div>
      <div style="color:#cbd5e1;margin-bottom:8px">Current phase: <b id="us-phase-label" style="color:#67e8f9"></b></div>
      <label>FS2EFB JSON URL<input id="us-fs2efb" placeholder="http://device-ip:port/status or /api/fs2efb" style="width:100%;margin:4px 0 8px;background:#0f172a;color:white;border:1px solid #334155;border-radius:8px;padding:8px"></label>
      <label>SayIntentions Traffic/API URL<input id="us-si" placeholder="https://.../traffic or /api/sayintentions/traffic" style="width:100%;margin:4px 0 8px;background:#0f172a;color:white;border:1px solid #334155;border-radius:8px;padding:8px"></label>
      <label>SayIntentions API Key <small style="color:#94a3b8">optional if using backend env</small><input id="us-si-key" type="password" placeholder="Bearer token / API key" style="width:100%;margin:4px 0 8px;background:#0f172a;color:white;border:1px solid #334155;border-radius:8px;padding:8px"></label>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><input id="us-si-audio" type="checkbox" style="width:auto"> Play received traffic transmissions</label>
      <button id="us-save" style="background:#22d3ee;color:#082f49;border:0;border-radius:10px;padding:8px 12px;font-weight:800">Save + Start Polling</button>
      <button id="us-test" style="background:#10b981;color:#052e16;border:0;border-radius:10px;padding:8px 12px;margin-left:6px;font-weight:800">Test Traffic Audio</button>
      <button id="us-hide" style="background:#1e293b;color:#fff;border:1px solid #334155;border-radius:10px;padding:8px 12px;margin-left:6px">Hide</button>`;
    document.body.appendChild(box);
    const c=loadCfg();
    document.getElementById('us-fs2efb').value=c.fs2efb.url||'';
    document.getElementById('us-si').value=c.sayIntentions.url||'';
    document.getElementById('us-si-key').value=c.sayIntentions.apiKey||'';
    document.getElementById('us-si-audio').checked=!!c.sayIntentions.audio;
    document.getElementById('us-prev').onclick=()=>stepPhase(-1);
    document.getElementById('us-next').onclick=()=>stepPhase(1);
    document.getElementById('us-phase-select').onchange=e=>setPhase(e.target.value,'manual_select');
    document.getElementById('us-save').onclick=()=>{
      saveCfg({
        fs2efb:{...loadCfg().fs2efb,enabled:!!document.getElementById('us-fs2efb').value,url:document.getElementById('us-fs2efb').value},
        sayIntentions:{...loadCfg().sayIntentions,enabled:!!document.getElementById('us-si').value,url:document.getElementById('us-si').value,apiKey:document.getElementById('us-si-key').value,audio:document.getElementById('us-si-audio').checked},
        syntheticTraffic:false,
        externalTrafficAudio:document.getElementById('us-si-audio').checked
      });
      cfg=loadCfg(); panelStatus('Saved. Polling connectors.'); restartPolling();
    };
    document.getElementById('us-test').onclick=()=>injectTrafficIntoEngine([{id:'TEST1',callsign:'TEST123',phrase:'Bradshaw Approach, Test one two three, level five thousand established on Gulf six three three.'}]);
    document.getElementById('us-hide').onclick=()=>box.remove();
    updatePhasePanel(); restartPolling();
  }

  window.SkyEchoUltraStrict={version:'6.9.47',loadCfg,saveCfg,normalizeTranscript,classify,shouldBlockRadarLoop,disableSyntheticTraffic,getPhase,setPhase,stepPhase,injectTrafficIntoEngine,pollSayIntentions,pollFs2efb};
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',buildPanel); else buildPanel();
})();

</script>


<script id="skyecho-v6967-stable-frontend-native-atc-restore-js">
(function(){
  "use strict";
  if(window.__SkyEchoStableNativeAtcRestoreV6967)return;
  window.__SkyEchoStableNativeAtcRestoreV6967=true;

  const RENDER_DEFAULT="https://skyecho-backend-ai-traffic-orchestrator.onrender.com";
  const state={lastTelemetryPoll:0,lastRelayPoll:0,lastError:null,telemetry:null};
  window.__skyechoStableFrontendV6967=state;

  function now(){return Date.now()}
  function backendBase(){

    catch{return RENDER_DEFAULT}
  }

(function(){

  function lower(el){return textOf(el).toLowerCase();}
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
  function getIp(){try{return localStorage.getItem(LS_IP)||"127.0.0.1"}catch{return"127.0.0.1"}}
  function getPort(){try{return localStorage.getItem(LS_PORT)||"8787"}catch{return"8787"}}

    try{
      const ip=document.getElementById("skc-ip")?.value||"127.0.0.1";

    }catch{}
  }
  function status(msg,k){
    const e=document.getElementById("skc-status");
    if(e)e.innerHTML='<span class="skc-pill">'+escapeHtml(k||"STATUS")+'</span> '+escapeHtml(msg)+'<div class="skc-note">Last update: '+escapeHtml(new Date().toLocaleTimeString())+'</div>';
  }

  function makeMovable(box,handles,key){
    if(!box||box.__skcMovable)return;
    box.__skcMovable=true;
    try{
      const saved=JSON.parse(localStorage.getItem(key)||"null");
      if(saved&&Number.isFinite(saved.left)&&Number.isFinite(saved.top)){
        box.style.left=saved.left+"px";box.style.top=saved.top+"px";box.style.right="auto";box.style.bottom="auto";
      }
    }catch{}
    let drag=false,sx=0,sy=0,sl=0,st=0,moved=false;
    const start=e=>{
      if(e.target&&e.target.closest&&e.target.closest("button,input,select,textarea"))return;
      drag=true;moved=false;
      try{e.currentTarget.setPointerCapture(e.pointerId)}catch{}
      const r=box.getBoundingClientRect();sx=e.clientX;sy=e.clientY;sl=r.left;st=r.top;
    };
    const move=e=>{
      if(!drag)return;
      const dx=e.clientX-sx,dy=e.clientY-sy;
      if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
      const nx=Math.max(6,Math.min(window.innerWidth-70,sl+dx));
      const ny=Math.max(6,Math.min(window.innerHeight-40,st+dy));
      box.style.left=nx+"px";box.style.top=ny+"px";box.style.right="auto";box.style.bottom="auto";
    };
    const end=()=>{
      if(!drag)return;drag=false;
      const r=box.getBoundingClientRect();
      try{localStorage.setItem(key,JSON.stringify({left:r.left,top:r.top}))}catch{}
    };
    handles.forEach(h=>{
      h.addEventListener("pointerdown",start);
      h.addEventListener("pointermove",move);
      h.addEventListener("pointerup",end);
      h.addEventListener("pointercancel",end);
    });
  }

  function candidatePanel(el){

      if(n.id==="root"||n.classList&&n.classList.contains("app-shell"))break;
      choices.push(n);

    }) || choices[0] || null;

    root.innerHTML=

        '<div class="skc-stack-head"><div class="skc-stack-title"><span>Transmissions</span><small>Compact radio log</small></div><button class="skc-stack-btn" id="skc-log-toggle">+</button></div>'+
        '<div class="skc-stack-body" id="skc-transmissions-body"><div class="skc-empty">Waiting for radio activity…</div></div>'+
      '</div>'+
      '<div class="skc-stack-card" id="skc-session-card">'+
        '<div class="skc-stack-head"><div class="skc-stack-title"><span>Session Tools</span><small>Flight setup tabs</small></div><button class="skc-stack-btn" id="skc-session-toggle">+</button></div>'+
        '<div class="skc-stack-body">'+
          '<div class="skc-tabs">'+
            '<button class="skc-tab active" data-tab="flight">Flight</button>'+
            '<button class="skc-tab" data-tab="weather">Weather</button>'+
            '<button class="skc-tab" data-tab="mic">Mic</button>'+
            '<button class="skc-tab" data-tab="cabin">Cabin</button>'+
            '<button class="skc-tab" data-tab="traffic">Traffic</button>'+
          '</div>'+
          '<div class="skc-tab-content" id="skc-tab-content"><div class="skc-empty">Select a setup tab.</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="skc-stack-card" id="skc-control-card">'+
        '<div class="skc-stack-head"><div class="skc-stack-title"><span>SkyEcho Control</span><small>Traffic + Telemetry</small></div><button class="skc-stack-btn" id="skc-control-toggle">+</button></div>'+
        '<div class="skc-stack-body">'+
          '<div class="skc-control-row"><button class="skc-btn skc-start" id="skc-start">Start Traffic</button><button class="skc-btn skc-stop" id="skc-stop">Stop Traffic</button></div>'+
          '<div class="skc-control-row"><button class="skc-btn skc-verify" id="skc-verify">Verify Telemetry</button></div>'+
          '<div class="skc-label">Telemetry Adapter</div>'+
          '<div class="skc-field"><input id="skc-ip" placeholder="Adapter IP" value="'+escapeHtml(getIp())+'"><input id="skc-port" placeholder="Port" value="'+escapeHtml(getPort())+'"></div>'+
          '<div class="skc-control-row"><button class="skc-btn skc-copy" id="skc-copy">Copy Adapter Command</button></div>'+
          '<div class="skc-status" id="skc-status"><span class="skc-pill">Ready</span> Traffic and telemetry are controlled here.<div class="skc-note">Drag this stack by any title bar.</div></div>'+
        '</div>'+
      '</div>';
    document.body.appendChild(root);

    function toggle(cardId,btnId){
      const c=document.getElementById(cardId),b=document.getElementById(btnId);
      c.classList.toggle("skc-open");
      b.textContent=c.classList.contains("skc-open")?"–":"+";
      if(c.classList.contains("skc-open"))document.body.classList.remove("skc-ptt-only");
      else if(!document.querySelector(".skc-stack-card.skc-open"))document.body.classList.add("skc-ptt-only");
    }
    document.getElementById("skc-log-toggle").onclick=()=>toggle("skc-transmissions-card","skc-log-toggle");
    document.getElementById("skc-session-toggle").onclick=()=>toggle("skc-session-card","skc-session-toggle");
    document.getElementById("skc-control-toggle").onclick=()=>toggle("skc-control-card","skc-control-toggle");
    document.querySelectorAll("#skc-session-card .skc-tab").forEach(btn=>btn.onclick=()=>renderTab(btn.dataset.tab));

    document.getElementById("skc-start").onclick=startTraffic;
    document.getElementById("skc-stop").onclick=stopTraffic;
    document.getElementById("skc-verify").onclick=verifyTelemetry;
    document.getElementById("skc-copy").onclick=copyAdapterCommand;
    document.getElementById("skc-ip").onchange=setIpPort;
    document.getElementById("skc-port").onchange=setIpPort;

    makeMovable(root,[...root.querySelectorAll(".skc-stack-head")],"skyecho_stack_position");
  }

  function syncCompactLogs(){
    const body=document.getElementById("skc-transmissions-body");
    if(!body)return;
    const source=[...document.querySelectorAll(".log")].filter(l=>!l.closest("#skc-stack-root")).slice(-40).reverse();
    if(!source.length)return;
    body.innerHTML="";
    source.slice(0,14).forEach(l=>{
      const s=lower(l);
      if(s.includes("piper voices scanned")||s.includes("controller voice pool unlocked")||s.includes("piper is now connected")||s.includes("voice models are locked"))return;
      const type=s.includes("pilot")?"pilot":s.includes("network")?"network":s.includes("system")?"system":s.includes("crew")?"crew":"atc";
      const meta=l.querySelector(".log-meta")?textOf(l.querySelector(".log-meta")):"";
      const msg=textOf(l).replace(meta,"").trim();
      const item=document.createElement("div");
      item.className="skc-log-item skc-log-"+type;
      item.innerHTML='<div class="skc-log-meta"><span>'+escapeHtml(type)+'</span><span>'+escapeHtml(new Date().toLocaleTimeString())+'</span></div><div>'+escapeHtml(msg)+'</div>';
      body.appendChild(item);
    });
  }

  function sanitizeRouteInputs(){
    const routeLike=[...document.querySelectorAll("textarea,input")].filter(el=>{
      const meta=((el.id||"")+" "+(el.name||"")+" "+(el.placeholder||"")+" "+(el.getAttribute("aria-label")||"")+" "+textOf(el.closest("label")||el.parentElement)).toLowerCase();
      return meta.includes("route")||meta.includes("routing")||meta.includes("simbrief");
    });
    routeLike.forEach(el=>{
      if(el.__skyechoRouteSanitizer)return;
      el.__skyechoRouteSanitizer=true;
      const clean=()=>{
        const old=String(el.value||"");
        const neu=old.replace(/\bN\d{3}F\d{3}\b/g,"").replace(/\bM\d{3}F\d{3}\b/g,"").replace(/\bN\d{3}A\d{3}\b/g,"").replace(/\bM\d{3}A\d{3}\b/g,"").replace(/\s{2,}/g," ").trim();
        if(neu!==old){
          el.value=neu;
          el.dispatchEvent(new Event("input",{bubbles:true}));
          el.dispatchEvent(new Event("change",{bubbles:true}));
          status("Removed cruise/speed token from route so ATC will not read it as a fix.","ROUTE");
        }
      };
      el.addEventListener("blur",clean);
      el.addEventListener("change",clean);
      setTimeout(clean,200);
    });
  }

  async function postJson(paths){
    setIpPort();
    let last=null;
    for(const p of paths){
      try{
        const r=await fetch(BACKEND+p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({source:"skyecho-control-ui"}),cache:"no-store"});
        if(r.ok)return p;
        last=new Error(p+": "+r.status);
      }catch(e){last=e}
    }
    throw last||new Error("No endpoint responded");
  }
  async function getJson(paths){
    setIpPort();
    let last=null;
    for(const p of paths){
      try{
        const r=await fetch(BACKEND+p,{cache:"no-store"});
        const raw=await r.text();
        let d={};
        try{d=raw?JSON.parse(raw):{}}catch{d={raw}}
        if(r.ok)return{path:p,data:d};
        last=new Error(p+": "+r.status);
      }catch(e){last=e}
    }
    throw last||new Error("No endpoint responded");
  }
  async function startTraffic(){
    status("Starting AI backend traffic…","TRAFFIC");
    try{status("AI traffic started through "+await postJson(["/traffic-v2/start","/api/traffic/start","/traffic/start"])+".","ON")}
    catch(e){status("Could not start backend traffic: "+(e.message||e),"ERROR")}
  }
  async function stopTraffic(){
    status("Stopping AI backend traffic…","TRAFFIC");
    try{
      status("AI traffic stopped through "+await postJson(["/traffic-v2/stop","/api/traffic/stop","/traffic/stop"])+".","OFF");
      try{window.SkyEchoObservedTrafficRadio&&window.SkyEchoObservedTrafficRadio.stop&&window.SkyEchoObservedTrafficRadio.stop()}catch{}
    }catch(e){status("Could not stop backend traffic: "+(e.message||e),"ERROR")}
  }
  async function verifyTelemetry(){
    status("Checking simulator telemetry…","VERIFY");
    try{
      const r=await getJson(["/api/telemetry/state","/traffic-v2/state","/api/fs2efb/state"]);
      const d=r.data||{};
      const traffic=(Array.isArray(d.traffic)&&d.traffic.length)||(Array.isArray(d.aircraft)&&d.aircraft.length)||(Array.isArray(d.targets)&&d.targets.length)||0;
      let bits=['<span class="skc-pill">Endpoint '+escapeHtml(r.path)+'</span>','<span class="skc-pill">'+(d.ok===false?"Check source":"Connected")+'</span>'];
      if(traffic)bits.push('<span class="skc-pill">'+traffic+' traffic targets</span>');
      bits.push('<span class="skc-pill">Adapter '+escapeHtml(getIp())+':'+escapeHtml(getPort())+'</span>');
      const e=document.getElementById("skc-status");
      if(e)e.innerHTML=bits.join(" ")+'<div class="skc-note">Telemetry verify complete.</div>';
    }catch(e){status("Telemetry verify failed: "+(e.message||e),"ERROR")}
  }
  async function copyAdapterCommand(){
    setIpPort();
    const cmd='node skyecho-fs2efb-local-relay/server.js --port '+getPort();
    try{await navigator.clipboard.writeText(cmd);status("Telemetry adapter command copied. Run it locally once.","COPIED")}
    catch{status("Command: "+cmd,"ADAPTER")}
  }

  function enableChromeDictation(){
    try{
      if(/Chrome|CriOS|Edg/i.test(navigator.userAgent||"")){
        window.SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition||window.SpeechRecognition;
        window.__skyechoChromeDictationAvailable=!!window.SpeechRecognition;
      }
    }catch{}
  }

  function boot(){
    createStack();
    enableChromeDictation();
    movePttTop();
    hideOldPanels();
    hidePiperAndAdvancedVoiceButKeepMic();
    sanitizeRouteInputs();
    syncCompactLogs();
    document.body.classList.add("skc-ptt-only");
    setTimeout(()=>{movePttTop();hideOldPanels();hidePiperAndAdvancedVoiceButKeepMic();sanitizeRouteInputs();syncCompactLogs();document.body.classList.add("skc-ptt-only");},800);
    setTimeout(()=>{movePttTop();hideOldPanels();hidePiperAndAdvancedVoiceButKeepMic();sanitizeRouteInputs();syncCompactLogs();},2200);
    setInterval(()=>{movePttTop();hideOldPanels();hidePiperAndAdvancedVoiceButKeepMic();sanitizeRouteInputs();syncCompactLogs();},3000);
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});
  else boot();
})();
</script>

<script id="skyecho-v758-top-tabs-real-js">
(function(){
  "use strict";
  if(window.__SkyEchoV758TopTabsReal)return;
  window.__SkyEchoV758TopTabsReal=true;

  const ADSB_API="https://api.adsb.lol";
  const ADSB_DEFAULT_RADIUS_NM=35;
  const LATERAL_MIN_NM=5;
  const VERTICAL_MIN_FT=1000;
  let adsbTimer=null, adsbEnabled=false;

  function qsa(sel,root){return Array.from((root||document).querySelectorAll(sel))}
  function textOf(e){return (e&&e.innerText||e&&e.textContent||"").replace(/\s+/g," ").trim()}
  function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}

  function drawer(){
    let d=document.getElementById("skc-v758-drawer");
    if(!d){
      d=document.createElement("div");
      d.id="skc-v758-drawer";
      document.body.appendChild(d);
    }
    return d;
  }

  function setActive(kind){
    qsa("#skc-v758-topbar button").forEach(b=>b.classList.toggle("skc-active", b.dataset.k===kind));
  }

  function closeDrawer(){
    const d=drawer();
    d.classList.remove("skc-open");
    setActive("");
  }

  function openDrawer(title){
    const d=drawer();
    d.classList.add("skc-open");
    d.innerHTML='<div class="skc-v758-head"><span>'+esc(title)+'</span><button class="skc-v758-close">Close</button></div><div id="skc-v758-content"></div>';
    d.querySelector(".skc-v758-close").onclick=closeDrawer;
    return d.querySelector("#skc-v758-content");
  }

  function cloneSafe(node, allowInputs){
    const cl=node.cloneNode(true);
    cl.classList.add("skc-v758-block");
    qsa("script",cl).forEach(x=>x.remove());
    if(!allowInputs){
      qsa("button,input,select,textarea",cl).forEach(x=>{x.disabled=true;x.tabIndex=-1});
    }
    return cl;
  }

  function openOriginalSessionTab(tab){
    // Use original hidden Session Tools tab render function by clicking its real button,
    // then clone the resulting original skc-tab-content into our top drawer.
    const realTab = qsa("#skc-session-card .skc-tab").find(b => String(b.dataset.tab||"").toLowerCase() === tab);
    const content = document.getElementById("skc-tab-content");
    if(realTab) {
      try { realTab.click(); } catch(e) {}
    }
    const out=openDrawer(tab.toUpperCase());
    setActive(tab);
    if(content && textOf(content)){
      out.appendChild(cloneSafe(content, false));
      return;
    }
    // Fallback: find real page blocks if original tab did not populate.
    const fallback=findBlocks(tab);
    if(fallback.length){
      fallback.forEach(b=>out.appendChild(cloneSafe(b,false)));
    }else{
      out.innerHTML='<div class="skc-v758-block">No '+esc(tab)+' block is available yet.</div>';
    }
  }

  function findBlocks(kind){
    const rxMap={
      flight:/flight plan|flight planning|simbrief|origin|destination|route|routing|cost index|cruise|callsign/i,
      weather:/current weather|weather|metar|taf|atis|wind|qnh|altimeter/i,
      mic:/microphone|mic input|input device|speech|dictation|check mic|ptt|push to talk/i,
      traffic:/traffic injection|ai traffic|observed traffic|ads-b|adsb|separation|target|aircraft/i
    };
    const rx=rxMap[kind]||/./;
    return qsa(".panel,.status-card,.notice,.crew-box,.transcript-box,.readback-box,.logs-wrap,.logs-panel,section,form")
      .filter(e=>!e.closest("#skc-stack-root")&&!e.closest("#skc-v758-drawer")&&rx.test(textOf(e))).slice(0,4);
  }

  function openLogs(){
    setActive("logs");
    const out=openDrawer("TRANSMISSIONS");
    const body=document.getElementById("skc-transmissions-body");
    if(body && textOf(body)){
      out.appendChild(cloneSafe(body, false));
      return;
    }
    const logs=qsa(".log,.logs-wrap,.logs-panel,.transcript-box").filter(e=>!e.closest("#skc-stack-root"));
    if(logs.length){
      logs.slice(-20).reverse().forEach(l=>out.appendChild(cloneSafe(l,false)));
    }else{
      out.innerHTML='<div class="skc-v758-block">Waiting for radio activity…</div>';
    }
  }

  function nmBetween(a,b,c,d){
    const R=3440.065, toRad=x=>x*Math.PI/180;
    const dLat=toRad(c-a), dLon=toRad(d-b), la1=toRad(a), la2=toRad(c);
    const h=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
    return 2*R*Math.asin(Math.min(1,Math.sqrt(h)));
  }

  function ownship(){
    const list=[
      window.__skyechoOwnship,
      window.__skyechoTelemetryState&&window.__skyechoTelemetryState.ownship,
      window.__skyechoTelemetryState,
      window.__skyechoLastKnownTelemetry&&window.__skyechoLastKnownTelemetry.ownship,
      window.__skyechoLastKnownTelemetry,
      window.skyechoTelemetry
    ].filter(Boolean);
    for(const o of list){
      const lat=Number(o.latitude??o.lat), lon=Number(o.longitude??o.lon??o.lng);
      if(Number.isFinite(lat)&&Number.isFinite(lon)){
        return {lat,lon,alt:Number(o.altitudeFt??o.altitude??o.alt??o.indicatedAltitudeFt??0)||0};
      }
    }
    return null;
  }

  async function gps(){
    if(!navigator.geolocation)return null;
    return new Promise(resolve=>navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lon:p.coords.longitude,alt:0,gps:true}),
      ()=>resolve(null),
      {enableHighAccuracy:false,timeout:2500,maximumAge:30000}
    ));
  }

  function normalize(ac, center){
    const lat=Number(ac.lat), lon=Number(ac.lon);
    if(!Number.isFinite(lat)||!Number.isFinite(lon))return null;
    const alt=Number(ac.alt_baro==="ground"?0:(ac.alt_baro??ac.alt_geom??0))||0;
    const dist=center?nmBetween(center.lat,center.lon,lat,lon):Number(ac.dst||0);
    const vert=center?Math.abs(alt-(Number(center.alt)||0)):999999;
    return {
      source:"adsb.lol",
      hex:String(ac.hex||"").trim(),
      callsign:String(ac.flight||ac.callsign||ac.r||ac.hex||"").trim(),
      lat,lon,latitude:lat,longitude:lon,
      altitudeFt:alt,
      heading:Number(ac.track??ac.mag_heading??0)||0,
      groundSpeedKt:Number(ac.gs??0)||0,
      verticalRateFpm:Number(ac.baro_rate??ac.geom_rate??0)||0,
      squawk:ac.squawk||"",
      distanceNm:dist,
      verticalFt:vert,
      conflict:dist<LATERAL_MIN_NM&&vert<VERTICAL_MIN_FT,
      raw:ac
    };
  }

  async function fetchAdsbTraffic(radiusNm){
    const center=ownship()||await gps();
    if(!center)throw new Error("No ownship/GPS position yet.");
    const r=Math.max(1,Math.min(250,Number(radiusNm)||ADSB_DEFAULT_RADIUS_NM));
    const url=`${ADSB_API}/v2/lat/${center.lat.toFixed(5)}/lon/${center.lon.toFixed(5)}/dist/${r}`;
    const res=await fetch(url,{cache:"no-store"});
    if(!res.ok)throw new Error("adsb.lol HTTP "+res.status);
    const data=await res.json();
    const arr=Array.isArray(data.ac)?data.ac:(Array.isArray(data.aircraft)?data.aircraft:[]);
    const targets=arr.map(a=>normalize(a,center)).filter(Boolean);
    window.__skyechoAdsbLolRaw=data;
    window.__skyechoLiveAdsbTraffic=targets;
    window.__skyechoTrafficTargets=targets;
    window.__skyechoObservedTraffic=targets;
    window.dispatchEvent(new CustomEvent("skyecho:adsb-traffic",{detail:{center,radiusNm:r,targets,url}}));
    return {center,radiusNm:r,targets,url};
  }

  function openAdsb(){
    setActive("adsb");
    const out=openDrawer("ADS-B LIVE TRAFFIC");
    out.innerHTML='<div class="skc-v758-block"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><label>Radius NM <input id="skc-v758-adsb-radius" value="'+ADSB_DEFAULT_RADIUS_NM+'" inputmode="numeric" style="max-width:90px"></label><button id="skc-v758-adsb-fetch">Fetch Once</button><button id="skc-v758-adsb-start">Start</button><button id="skc-v758-adsb-stop">Stop</button></div><div id="skc-v758-adsb-status" style="margin-top:8px">Ready.</div></div>';
    const st=out.querySelector("#skc-v758-adsb-status");
    const radius=()=>Number(out.querySelector("#skc-v758-adsb-radius")?.value||ADSB_DEFAULT_RADIUS_NM);
    const once=async()=>{
      st.textContent="Fetching ADS-B traffic…";
      try{
        const r=await fetchAdsbTraffic(radius());
        const conflicts=r.targets.filter(t=>t.conflict);
        st.innerHTML='<b>'+esc(r.targets.length)+'</b> targets / '+esc(r.radiusNm)+' NM. '+(conflicts.length?'<b style="color:#fca5a5">'+conflicts.length+' conflicts</b>':'No separation alerts')+'<br><small>'+esc(r.url)+'</small>';
      }catch(e){
        st.innerHTML='<b style="color:#fca5a5">ADS-B error:</b> '+esc(e.message||e);
      }

<script id="skyecho-v763-safe-radio-lock-js">
(function(){
  "use strict";
  if(window.__SkyEchoV763SafeRadioLock)return;
  window.__SkyEchoV763SafeRadioLock=true;

  const state = {
    ptt:false,
    audioBusy:false,
    queue:[],
    mutedUntil:0,
    lastPilotAt:0,
    lastPttAt:0
  };

  function now(){return Date.now();}
  function low(v){return String(v||"").toLowerCase();}
  function textOf(e){return (e&&e.innerText||e&&e.textContent||"").replace(/\s+/g," ").trim();}
  function render(reason){
    try{
      let box=document.getElementById("skc-v763-radio-lock");
      if(!box){
        box=document.createElement("div");
        box.id="skc-v763-radio-lock";
        document.body.appendChild(box);
      }
      box.innerHTML='<b>RADIO</b> '+(state.ptt?'PILOT TX':'READY')+' · q '+state.queue.length+(state.audioBusy?' · busy':'')+(reason?' · '+reason:'');
    }catch(_){}
  }
  function isPttElement(el){
    if(!el)return false;
    const t=low((el.id||"")+" "+(el.className||"")+" "+textOf(el));
    return /\bptt\b|push.*talk|transmit|microphone|native mic/.test(t) && !/traffic|crew|cabin|adsb|telemetry|radio-lock/.test(t);
  }
  function isAiText(t){
    t=low(t);
    if(/radio lock|skc-v76|approach guard|telemetry/.test(t))return false;
    if(/pilot transcript captured|using browser\/typed transcript|ptt open|ptt closed|phase-aware stt cleanup/.test(t))return false;
    return /\b(ai_pilot|traffic|observed traffic|synthetic traffic|ai traffic)\b/.test(t);
  }
  function isPilotText(t){
    t=low(t);
    return /pilot transcript captured|using browser\/typed transcript|phase-aware stt cleanup|native stt|readback/.test(t);
  }
  function setPtt(on, why){
    state.ptt=!!on;
    if(on){
      state.lastPttAt=now();
      state.mutedUntil=now()+4500;
      try{ stopCurrentRadioAudio(); }catch(_){}
    }else{
      state.lastPilotAt=now();
      state.mutedUntil=now()+1800;

    }

      document.querySelectorAll("audio,video").forEach(a=>{

  function roleFromPhase(){

  function freqRoleTypes(role){

  function pickFrequency(airport,role){
    airport=upper(airport);

    const items=state.freqDb&&state.freqDb.airports&&state.freqDb.airports[airport]||[];
    const wanted=freqRoleTypes(role);
    for(const w of wanted){
      const found=items.find(x=>upper(x.type)===w || upper(x.description).includes(w));

  function normalizeOwnship(raw){

        heading:n(a.heading??a.hdg??a.Heading,0),

  async function pollTelemetry(){
    const base=adapterBase();

  function updateMini(){
    let box=document.getElementById("skc-v792-link-status");

      box=document.createElement("div");

        'CTRL '+ctrl.name+' '+ctrl.frequency+'<br>'+
        'REG '+ctrl.region+' · '+ctrl.source+'<br>'+

    }
  }
  async function loadData(){
    try{
      const [freqs,air]=await Promise.all([
        fetch(DATA_PATHS.freqs,{cache:"no-store"}).then(r=>r.json()),
        fetch(DATA_PATHS.airspace,{cache:"no-store"}).then(r=>r.json())

  function patchAtcFetch(){
    if(window.__SkyEchoV792FetchPatched||!window.fetch)return;
    window.__SkyEchoV792FetchPatched=true;
    const nativeFetch=window.fetch.bind(window);
    window.fetch=function(input,init){
      try{
        const url=typeof input==="string"?input:(input&&input.url)||"";
        if(/atc|backend|orchestrator|radio|transmission/i.test(url) && init && typeof init.body==="string" && init.body.trim().startsWith("{")){
          const body=JSON.parse(init.body);

          body.traffic=Object.assign({},body.traffic||{}, {aircraft:state.traffic||[],source:"fs2efb",ok:state.trafficOk});

          body.frequency=ctrl.frequency;
          body.region=ctrl.region;
          body.navSources=Object.assign({},body.navSources||{}, {airportFrequencies:"airport-frequencies (1).csv",airspaceSchedule:"Airspace_Schedule.csv"});
          init=Object.assign({},init,{body:JSON.stringify(body)});

    };
  }
  function boot(){
    patchAtcFetch();
    loadData().then(()=>{syncController();updateMini();});
    pollTelemetry();
    pollTrafficOnly();
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setInterval(pollTelemetry,2500);
  setInterval(pollTrafficOnly,5000);
  setInterval(()=>{syncController();updateMini();},2000);

  window.SkyEchoV792Fs2EfbNav={
    state,
    loadData,
    pollTelemetry,
    pollTrafficOnly,
    syncController,
    pickFrequency,
    adapterBase,
    normalizeOwnship,
    normalizeTraffic
  };
})();

  async function load(){

  function boot(){

<script id="skyecho-v7100-load-start-clean-js">
(function(){
  "use strict";
  if(window.__SkyEchoV7100CleanLoadStart)return;
  window.__SkyEchoV7100CleanLoadStart=true;

  const MODE_KEY="skyecho_v7100_mode";

  function id(x){return document.getElementById(x)}
  function txt(el){return (el&&(el.innerText||el.textContent)||"").replace(/\s+/g," ").trim()}
  function val(x){const e=id(x);return e?String(("value" in e?e.value:e.textContent)||"").trim():""}
  function U(v){return String(v||"").trim().toUpperCase()}
  function cleanRoute(route){
    try{if(window.SkyEchoSourceAwareV780&&window.SkyEchoSourceAwareV780.cleanRoute)return window.SkyEchoSourceAwareV780.cleanRoute(route).join(" ")}catch(_){}
    return String(route||"").toUpperCase().replace(/[\n\r,]+/g," ").split(/\s+/).filter(Boolean).filter(t=>!/^(N|M)?\d{3}F\d{3}$|^F\d{2,3}$|^FL\d{2,3}$|^A\d{3,5}$|^\d{2,3}\/\d{2,3}$/i.test(t)).join(" ");
  }

  function buildPlan(){
    const route=cleanRoute(val("skc770-route"));
    const callsign=U(val("skc770-callsign")).replace(/\s+/g,"");
    const dep=U(val("skc770-dep")).replace(/[^A-Z0-9]/g,"").slice(0,4);
    const arr=U(val("skc770-arr")).replace(/[^A-Z0-9]/g,"").slice(0,4);
    const depRunway=U(val("skc770-deprwy")).replace(/^RWY\s*/,"");
    const arrRunway=U(val("skc770-arrrwy")).replace(/^RWY\s*/,"");
    const sid=U(val("skc770-sid"));
    const star=U(val("skc770-star"));
    const approach=U(val("skc770-app"));
    const cruise=val("skc770-cruise").replace(/[^\d]/g,"");
    const aircraft=U(val("skc770-aircraft"));
    const metar=val("skc770-weather");
    return {
      callsign, aircraft, aircraftType:aircraft, type:aircraft,
      departure:dep, origin:dep, dep,
      arrival:arr, destination:arr, arr,
      depRunway, departureRunway:depRunway, runway:depRunway,
      arrRunway, arrivalRunway:arrRunway,
      sid, star, approach, requestedApproach:approach,
      cruise, cruiseAltitude:cruise, initialAltitude:cruise, altitude:cruise,
      route, routeText:route, cleanRoute:route,
      metar, weather:{metar,status:metar?"Ready":"Manual/empty"},
      traffic:{source:val("skc770-traffic-source"),amount:Number(val("skc770-traffic-amount")||8),enabled:val("skc770-traffic-source")!=="off"},
      fs2efb:{ip:val("skc770-fs2ip"),httpPort:val("skc770-http")||"8787",udpPort:val("skc770-udp")||"49002"},
      phase:"clearance",
      started:true,
      sessionStarted:true,
      updatedAt:Date.now()
    };
  }

  function savePlan(plan){
    const state={
      version:"v7.10.0-clean-load",
      phase:"clearance",
      currentPhase:"clearance",
      plan, flightPlan:plan, activeFlightPlan:plan, atcPlan:plan,
      session:{...plan,plan},
      callsign:plan.callsign,
      aircraft:plan.aircraft,
      departure:plan.departure,
      arrival:plan.arrival,
      route:plan.route,
      routeText:plan.route,
      sid:plan.sid,
      star:plan.star,
      approach:plan.approach,
      depRunway:plan.depRunway,
      arrRunway:plan.arrRunway,
      cruise:plan.cruise,
      metar:plan.metar,
      weather:plan.weather,
      traffic:plan.traffic,
      started:true,
      sessionStarted:true,
      timestamp:Date.now()
    };
    const session={...plan,plan,state};

    window.__skyechoSession=session;
    window.__skyechoV770Session=session;
    window.__skyechoStartupSession=session;
    window.__skyechoActiveFlightPlan=plan;
    window.__skyechoFlightPlan=plan;
    window.__skyechoAtcPlan=plan;
    window.__skyechoCurrentPlan=plan;
    window.__skyechoAtcSession=session;
    window.__skyechoPhase="clearance";
    window.__skyechoCurrentPhase="clearance";
    if(plan.metar)window.__skyechoMetar=plan.metar;

    try{
      localStorage.setItem("skyechoSession",JSON.stringify(session));
      localStorage.setItem("skyecho_v770_session",JSON.stringify(session));
      localStorage.setItem("skyechoStartupSession",JSON.stringify(session));
      localStorage.setItem("skyecho_active_plan",JSON.stringify(plan));
      localStorage.setItem("skyecho_flight_plan",JSON.stringify(plan));
      localStorage.setItem("skyecho_atc_plan",JSON.stringify(plan));
      localStorage.setItem("skyecho_current_plan",JSON.stringify(plan));
      localStorage.setItem("skyecho_state_v6",JSON.stringify(state));
    }catch(_){}

    try{window.SkyEchoSourceAwareV780&&window.SkyEchoSourceAwareV780.applyToSession&&window.SkyEchoSourceAwareV780.applyToSession()}catch(_){}
    ["skyecho:session-sync","skyecho:v770-session-sync","skyecho:flightplan-sync","skyecho:plan-loaded","skyecho:start-session","skyecho:atc-session-ready"].forEach(name=>{
      try{window.dispatchEvent(new CustomEvent(name,{detail:{session,plan,state}}))}catch(_){}
    });
    return {session,plan,state};
  }

  function showApp(saved){
    try{localStorage.setItem(MODE_KEY,"app")}catch(_){}
    document.body.classList.remove("skc-v7100-startup-mode");
    document.body.classList.add("skc-v7100-app-mode","skc-v770-session-active","skc-v770-clean","skc-session-started","skyecho-session-started");
    const st=id("skc-v770-startup");
    if(st){
      st.style.display="none";
      st.style.visibility="hidden";
      st.style.opacity="0";
      st.style.pointerEvents="none";
      st.setAttribute("aria-hidden","true");
    }
    const root=id("root");
    if(root){
      root.style.filter="none";
      root.style.opacity="1";
      root.style.pointerEvents="auto";
      root.style.userSelect="auto";
    }
    try{window.dispatchEvent(new Event("resize"))}catch(_){}
    if(saved)console.log("[SkyEcho v7.10.0] App opened",saved);
  }

  function showStartup(){
    try{localStorage.setItem(MODE_KEY,"startup")}catch(_){}
    document.body.classList.add("skc-v7100-startup-mode");
    document.body.classList.remove("skc-v7100-app-mode","skc-v770-session-active","skc-v770-clean","skc-session-started","skyecho-session-started");
    const st=id("skc-v770-startup");
    if(st){
      st.style.display="block";
      st.style.visibility="visible";
      st.style.opacity="1";
      st.style.pointerEvents="auto";
      st.removeAttribute("aria-hidden");
      st.scrollIntoView({behavior:"smooth",block:"start"});
    }
  }

  function startSession(){
    try{window.speechSynthesis&&window.speechSynthesis.cancel()}catch(_){}
    const saved=savePlan(buildPlan());
    showApp(saved);
    return saved;
  }

  function installLoadButton(){
    const old=id("skc770-load");
    if(!old || old.__v7100Clean)return;
    const b=old.cloneNode(true);
    b.__v7100Clean=true;
    b.addEventListener("click",function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      startSession();
    },true);
    old.parentNode.replaceChild(b,old);
  }

  function installBackButton(){
    const reset=[...document.querySelectorAll("button")].find(b=>/^reset session$/i.test(txt(b)));
    if(!reset || id("skc-v7100-back-startup"))return;
    const b=document.createElement("button");
    b.id="skc-v7100-back-startup";
    b.type="button";
    b.textContent="Back To Startup";
    b.addEventListener("click",function(e){
      e.preventDefault();
      e.stopImmediatePropagation();
      showStartup();
    },true);
    reset.insertAdjacentElement("afterend",b);
  }

  function hideOldUi(){
    const old=id("skc-v760-telemetry-mini");
    if(old){old.style.display="none";old.style.visibility="hidden";old.style.opacity="0";old.style.pointerEvents="none"}
    document.querySelectorAll("button,div,span,a").forEach(el=>{
      const t=txt(el), c=((el.id||"")+" "+(el.className||"")).toLowerCase();
      const r=el.getBoundingClientRect?el.getBoundingClientRect():null;
      const br=r&&r.right>window.innerWidth-390&&r.bottom>window.innerHeight-120;
      if(/show skyecho/i.test(t)||/^skyecho\s+v/i.test(t)||(br&&/(version|build|stable|processed|procedure)/i.test(t+" "+c))){
        el.style.display="none";el.style.visibility="hidden";el.style.opacity="0";el.style.pointerEvents="none";
      }
    });
  }

  function boot(){
    installLoadButton();
    installBackButton();
    hideOldUi();
    try{if(localStorage.getItem(MODE_KEY)==="startup")showStartup()}catch(_){}
  }

  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,250);
  setTimeout(boot,1000);
  setInterval(()=>{installLoadButton();installBackButton();hideOldUi();},2500);

  window.SkyEchoV7100LoadStartClean={buildPlan,savePlan,startSession,showStartup,showApp};
})();
</script>

<script id="skyecho-v7102-audio-log-js">
(function(){
  "use strict";
  if(window.__SkyEchoV7102AudioLogNoFreqTouch)return;
  window.__SkyEchoV7102AudioLogNoFreqTouch=true;

  const POS_KEY="skyecho_v7102_log_pos";
  const MUTED_KEY="skyecho_v7102_browser_tts_muted";
  const rows=[];
  const MAX_ROWS=80;

  try{
    if(localStorage.getItem(MUTED_KEY)==null)localStorage.setItem(MUTED_KEY,"1");
  }catch(_){}
  window.__skyechoBrowserTtsMuted=true;
  window.__skyechoAllowBrowserTts=false;

  function isMuted(){try{return localStorage.getItem(MUTED_KEY)!=="0"}catch(_){return true}}
  function textOf(el){return (el&&(el.innerText||el.textContent)||"").replace(/\s+/g," ").trim()}
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
  function rowKind(t){
    t=String(t||"");
    if(/\b(ATC|CONTROLLER|GROUND|TOWER|APPROACH|DEPARTURE|CENTER)\b/i.test(t))return"atc";
    if(/\b(PILOT|readback|with you|request|ready)\b/i.test(t))return"pilot";
    if(/\b(NETWORK|FS2EFB|Piper|audio|telemetry|traffic)\b/i.test(t))return"net";
    if(/\b(warn|blocked|failed|error|fallback)\b/i.test(t))return"warn";
    return"";
  }
  function addRow(t,kind){
    t=String(t||"").trim();
    if(!t)return;
    if(rows.length&&rows[rows.length-1].text===t)return;
    rows.push({text:t,kind:kind||rowKind(t),time:new Date().toLocaleTimeString()});
    while(rows.length>MAX_ROWS)rows.shift();
    renderRows();
  }
  function createLog(){
    let box=document.getElementById("skc-v7102-log-window");
    if(box)return box;
    box=document.createElement("div");
    box.id="skc-v7102-log-window";
    box.innerHTML='<div class="head"><b>SkyEcho Log</b><div class="tools"><button data-act="mute">Browser TTS: OFF</button><button data-act="min">–</button></div></div><div class="body"></div>';
    document.body.appendChild(box);
    const saved=loadPos();
    if(saved){
      box.style.left=saved.left+"px";
      box.style.top=saved.top+"px";
      box.style.right="auto";
      box.style.width=saved.width+"px";
    }
    const min=box.querySelector('[data-act="min"]');
    const mute=box.querySelector('[data-act="mute"]');
    min.addEventListener("click",function(e){
      e.preventDefault();e.stopPropagation();
      box.classList.toggle("min");
      min.textContent=box.classList.contains("min")?"+":"–";
    },true);
    mute.addEventListener("click",function(e){
      e.preventDefault();e.stopPropagation();
      const next=isMuted()?"0":"1";
      try{localStorage.setItem(MUTED_KEY,next)}catch(_){}
      window.__skyechoBrowserTtsMuted=next!=="0";
      window.__skyechoAllowBrowserTts=next==="0";
      mute.textContent="Browser TTS: "+(next==="0"?"ON":"OFF");
      if(next!=="0")try{speechSynthesis.cancel()}catch(_){}
    },true);
    makeMovable(box,box.querySelector(".head"));
    return box;
  }
  function renderRows(){
    const box=createLog();
    const body=box.querySelector(".body");
    if(!body)return;
    body.innerHTML=rows.slice(-36).reverse().map(r=>'<div class="row '+r.kind+'"><small>'+escapeHtml(r.time)+'</small> · '+escapeHtml(r.text)+'</div>').join("");
  }
  function loadPos(){try{return JSON.parse(localStorage.getItem(POS_KEY)||"null")}catch(_){return null}}
  function savePos(p){try{localStorage.setItem(POS_KEY,JSON.stringify(p))}catch(_){}}
  function clamp(n,min,max){return Math.max(min,Math.min(max,n))}
  function makeMovable(box,handle){
    if(!box||box.__v7102Move)return;
    box.__v7102Move=true;
    let drag=null;
    handle.addEventListener("pointerdown",function(e){
      if(e.target&&e.target.tagName==="BUTTON")return;
      const r=box.getBoundingClientRect();
      drag={x:e.clientX,y:e.clientY,left:r.left,top:r.top,width:r.width};
      box.style.left=r.left+"px";
      box.style.top=r.top+"px";
      box.style.right="auto";
      box.style.width=r.width+"px";
      try{handle.setPointerCapture(e.pointerId)}catch(_){}
      e.preventDefault();e.stopPropagation();
    },true);
    handle.addEventListener("pointermove",function(e){
      if(!drag)return;
      box.style.left=clamp(drag.left+(e.clientX-drag.x),0,window.innerWidth-80)+"px";
      box.style.top=clamp(drag.top+(e.clientY-drag.y),0,window.innerHeight-40)+"px";
      box.style.width=drag.width+"px";
      e.preventDefault();e.stopPropagation();
    },true);
    function finish(e){
      if(!drag)return;
      const r=box.getBoundingClientRect();
      savePos({left:Math.round(r.left),top:Math.round(r.top),width:Math.round(r.width)});
      drag=null;
      try{handle.releasePointerCapture(e.pointerId)}catch(_){}
      e.preventDefault();e.stopPropagation();
    }
    handle.addEventListener("pointerup",finish,true);
    handle.addEventListener("pointercancel",finish,true);
  }
  function patchSpeakOnly(){
    try{
      if(!("speechSynthesis" in window)||window.__SkyEchoV7102SpeakOnlyPatched)return;
      window.__SkyEchoV7102SpeakOnlyPatched=true;
      const synth=window.speechSynthesis;
      const native=synth.speak?synth.speak.bind(synth):null;
      if(!native)return;
      synth.speak=function(utterance){
        try{
          const tx=String((utterance&&utterance.text)||"").trim();
          if(isMuted()&&!window.__skyechoAllowBrowserTts){
            addRow("Blocked duplicate browser voice: "+tx.slice(0,130),"warn");
            try{synth.cancel()}catch(_){}
            return;
          }
        }catch(_){}
        return native(utterance);
      };
      try{synth.cancel()}catch(_){}
    }catch(e){try{console.warn("[SkyEcho v7.10.2] browser speech mute failed",e)}catch(_){}}
  }
  function scanLogs(){
    const found=[];
    try{
      document.querySelectorAll(".skc-log,.log,.logs,[id*='log' i],[class*='log' i]").forEach(el=>{
        if(el.id==="skc-v7102-log-window"||el.closest("#skc-v7102-log-window"))return;
        const t=textOf(el);
        if(!t||t.length<5||t.length>450)return;
        if(/SkyEcho Log|Browser TTS/i.test(t))return;
        found.push(t);
      });
      document.querySelectorAll("*").forEach(el=>{
        if(el.children.length||el.closest("#skc-v7102-log-window"))return;
        const t=textOf(el);
        if(!t||t.length<8||t.length>220)return;
        if(/\b(ATC|PILOT|NETWORK|CONTROLLER|Ground|Tower|Departure|Approach|Center|cleared|contact|taxi|readback|Piper|telemetry)\b/i.test(t))found.push(t);
      });
    }catch(_){}
    found.slice(-12).forEach(t=>addRow(t));
  }
  function patchConsole(){
    try{
      if(window.__SkyEchoV7102ConsolePatched)return;
      window.__SkyEchoV7102ConsolePatched=true;
      ["log","warn","error"].forEach(k=>{
        const native=console[k]&&console[k].bind(console);
        if(!native)return;
        console[k]=function(){
          try{
            const msg=Array.from(arguments).map(a=>typeof a==="string"?a:JSON.stringify(a)).join(" ");
            if(/SkyEcho|ATC|Piper|telemetry|traffic|FS2EFB|radio/i.test(msg))addRow(msg,k==="log"?"":"warn");
          }catch(_){}
          return native.apply(console,arguments);
        };
      });
    }catch(_){}
  }
  function boot(){
    createLog();
    patchSpeakOnly();
    patchConsole();
    scanLogs();
    try{if(isMuted())speechSynthesis.cancel()}catch(_){}
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot,{once:true});else boot();
  setTimeout(boot,250);
  setTimeout(boot,1000);
  setInterval(()=>{patchSpeakOnly();scanLogs()},1200);

  window.SkyEchoV7102AudioLogNoFreqTouch={
    muteBrowserTts:function(){try{localStorage.setItem(MUTED_KEY,"1");speechSynthesis.cancel()}catch(_){}},
    allowBrowserTts:function(){try{localStorage.setItem(MUTED_KEY,"0")}catch(_){}},
    addLog:addRow
  };
})();
</script>


<!-- SkyEcho v7.10.4 INVISIBLE ULTRA STRICT GUARD
