<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SkyEchoCabin Core v6.9.57</title><style>:root{color-scheme:dark;font-family:Inter,system-ui;background:#020817;color:#f8fafc}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:18px;background:radial-gradient(circle at 18% 8%,rgba(147,51,234,.55),transparent 30%),radial-gradient(circle at 82% 14%,rgba(14,165,233,.42),transparent 28%),linear-gradient(135deg,#16002e,#07235f 68%,#020617)}.app{max-width:1280px;margin:auto}.hero,.panel,.card{background:rgba(7,12,37,.78);border:1px solid rgba(148,163,184,.24);border-radius:24px;box-shadow:0 14px 40px rgba(0,0,0,.35);backdrop-filter:blur(12px)}.hero{padding:22px;margin-bottom:14px;display:flex;justify-content:space-between;gap:12px;align-items:center}.hero h1{margin:0;font-size:clamp(1.8rem,3vw,3rem)}.hero p{margin:.5rem 0 0;color:#bfdbfe}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.panel{padding:16px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.card{padding:12px}.card span{display:block;color:#a5b4fc;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em}.card strong{font-size:1.05rem}label{font-weight:800;font-size:.85rem;color:#cffafe;display:block;margin:10px 0 6px}input,textarea{width:100%;background:#0f172a;color:white;border:1px solid rgba(148,163,184,.3);border-radius:14px;padding:11px}textarea{min-height:100px}button{border:0;border-radius:14px;padding:11px 14px;font-weight:900;color:white;background:#1e293b;border:1px solid rgba(148,163,184,.25);cursor:pointer}.primary{background:linear-gradient(135deg,#a855f7,#22d3ee)}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.log{background:#0f172a;border:1px solid rgba(148,163,184,.2);border-radius:16px;padding:12px;min-height:190px;max-height:420px;overflow:auto;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.82rem}.ptt{width:100%;min-height:180px;border-radius:28px;background:linear-gradient(135deg,#f8fbff,#dbeafe);color:#0f172a;font-size:1.2rem}@media(max-width:900px){.grid,.cards{grid-template-columns:1fr}.hero{display:block}}</style></head><body><div class="app"><div class="hero"><div><h1>SkyEchoCabin Core</h1><p>Backend-driven ATC: FS2EFB telemetry + SimBrief route + parser + protected state machine + phraseology.</p></div><button class="primary" onclick="health()">Health</button></div><div class="cards"><div class="card"><span>Phase</span><strong id="phase">--</strong></div><div class="card"><span>Intent</span><strong id="intent">--</strong></div><div class="card"><span>Aircraft Count</span><strong id="aircraft">0</strong></div><div class="card"><span>Adapter</span><strong id="adapter">optional</strong></div></div><div class="grid"><div class="panel"><h2>Flight Session</h2><label>Backend URL</label><input id="backend"><label>Callsign</label><input id="callsign" value="UAL2324"><label>Aircraft</label><input id="aircraftType" value="B738"><label>Origin / Destination</label><div class="row"><input id="origin" value="KJFK" style="flex:1"><input id="dest" value="KCLT" style="flex:1"></div><label>Route</label><textarea id="route">MZULO3 N0472F320 Y309 ETECK CHSLY7</textarea><label>Cruise Altitude</label><input id="cruise" value="FL320"><div class="row"><button class="primary" onclick="startSession()">Start Core Session</button><button onclick="pollTelemetry()">Poll FS2EFB</button><button onclick="startTraffic()">Start Traffic</button></div><h2>Telemetry Ingest Test</h2><div class="row"><button onclick="sendTelemetry(15000,false)">Inject 15000ft</button><button onclick="sendTelemetry(32000,false)">Inject FL320</button></div></div><div class="panel"><h2>Radio / Parser</h2><button class="ptt" onclick="sendPilot()">Transmit Typed Pilot Call</button><label>Pilot transmission</label><textarea id="pilot">UAL2324 is with you descending on the CHSLY7 arrival</textarea><div class="row"><button onclick="quick('UAL2324 is with you passing 15000 for FL320 passing AIROW')">Route report</button><button onclick="quick('UAL2324 is with you descending on the CHSLY7 arrival')">Arrival check-in</button><button onclick="quick('UAL2324 is with you at request descent')">Request descent</button></div><h2>ATC / Engine Log</h2><div id="log" class="log"></div></div></div></div><script>const $=id=>document.getElementById(id);$('backend').value=localStorage.getItem('skyecho.core.backend')||location.origin;function base(){return $('backend').value.replace(/\/$/,'')}function log(type,obj){$('log').textContent=`[${new Date().toLocaleTimeString()}] ${type}\n${typeof obj==='string'?obj:JSON.stringify(obj,null,2)}\n\n`+$('log').textContent}async function api(path,opt){localStorage.setItem('skyecho.core.backend',$('backend').value);const r=await fetch(base()+path,opt);const tx=await r.text();let data;try{data=JSON.parse(tx)}catch{data={raw:tx}}return data}function update(s){if(!s)return;$('phase').textContent=s.phase||'--';$('intent').textContent=s.lastIntent||'--';$('aircraft').textContent=s.telemetry?1:0}async function health(){const d=await api('/health');update(d.engine);$('adapter').textContent=d.sayIntentionsAdapterEnabled?'SI on':'SI off';log('HEALTH',d)}async function startSession(){const p={callsign:$('callsign').value,aircraft:$('aircraftType').value,origin:$('origin').value,destination:$('dest').value,route:$('route').value,cruiseAltitude:$('cruise').value};const d=await api('/api/session/start',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(p)});update(d.session);log('SESSION START',d)}async function sendPilot(){const d=await api('/api/pilot/transmit',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({text:$('pilot').value})});update(d.session);log('PILOT',$('pilot').value);log('ATC',d.atcText);log('FULL RESULT',d)}function quick(t){$('pilot').value=t;sendPilot()}async function sendTelemetry(alt,onGround){const d=await api('/api/fs2efb/ingest',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({callsign:$('callsign').value,lat:35.2,lon:-80.9,altitude:alt,heading:210,groundSpeed:onGround?10:420,onGround,com1:'127.80'})});update(d.engine);log('TELEMETRY',d)}async function pollTelemetry(){const d=await api('/api/fs2efb');log('FS2EFB POLL',d)}async function startTraffic(){const d=await api('/traffic-v2/start',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({callsign:$('callsign').value,aircraft:$('aircraftType').value,origin:$('origin').value,dest:$('dest').value,route:$('route').value,userFrequency:'127.80'})});update(d.engine);log('TRAFFIC START',d)}health();</script></body></html>
